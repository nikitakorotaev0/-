<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>БИАР • Бюро Исследований Аномалий России</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --accent: #00cc55;
      --gray: #bbbbbb;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg);
      color: var(--gray);
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
    }
    .header {
      background: #0a0a0a;
      padding: 8px 15px;
      border-bottom: 1px solid var(--accent);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      font-size: 0.9rem;
    }
    .accent {
      color: var(--accent);
      text-shadow: 0 0 5px var(--accent);
    }
    .container {
      padding: 20px;
      height: calc(100vh - 52px);
      overflow-y: auto;
    }
    button {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 10px 16px;
      cursor: pointer;
      font-family: inherit;
      margin: 5px;
      transition: 0.2s;
      font-size: 0.9rem;
    }
    button:hover {
      background: var(--accent);
      color: #000;
      transform: scale(1.02);
    }
    input, textarea, select {
      background: #111;
      border: 1px solid #444;
      color: var(--gray);
      padding: 10px;
      width: 100%;
      font-family: inherit;
      margin: 8px 0;
      font-size: 1rem;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.97);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 10px;
    }
    .modal-content {
      background: #111;
      border: 1px solid var(--accent);
      padding: 25px;
      max-width: 720px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      max-width: 700px;
      margin: 40px auto;
    }
    .back-btn {
      margin-bottom: 15px;
    }
    .chat-container {
      display: flex;
      height: 65vh;
      border: 1px solid var(--accent);
    }
    .contacts {
      width: 240px;
      border-right: 1px solid #333;
      padding: 10px;
      background: #111;
    }
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #0a0a0a;
    }
    .message {
      margin: 10px 0;
      padding: 8px 12px;
      border-radius: 4px;
      max-width: 75%;
      word-wrap: break-word;
    }
    .message.admin {
      background: #002200;
      color: #00ff88;
      border-left: 3px solid #00ff88;
    }
    .message.si {
      background: #001122;
      color: #88ccff;
      border-left: 3px solid #88ccff;
    }
    .message.player {
      background: #221100;
      color: #ffcc88;
      margin-left: auto;
      text-align: right;
      border-right: 3px solid #ffcc88;
    }
    .input-area {
      padding: 12px;
      border-top: 1px solid #333;
      background: #111;
    }
    .status-bar {
      text-align: center;
      padding: 6px;
      background: #0a0a0a;
      font-size: 11px;
      color: var(--accent);
      border-top: 1px solid var(--accent);
    }
    .delete-msg-btn {
      background: none;
      border: none;
      color: #ff5555;
      font-size: 12px;
      margin-left: 10px;
      cursor: pointer;
    }
    .profile-photo {
      width: 180px;
      height: 180px;
      border: 2px solid var(--accent);
      background: #1a1a1a;
      margin: 15px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: 12px;
    }
    .security-ticker {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #000000cc;
      backdrop-filter: blur(4px);
      color: #0f0;
      font-size: 10px;
      padding: 4px;
      text-align: center;
      z-index: 99;
      border-top: 1px solid var(--accent);
      white-space: nowrap;
      overflow-x: auto;
    }
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #0f0;
    }
    .hidden {
      display: none;
    }
    /* Центрирование ASCII-арта */
    .ascii-logo {
      font-family: monospace;
      white-space: pre;
      font-size: 10px;
      line-height: 1.2;
      color: var(--accent);
      text-align: center;
      margin-bottom: 20px;
    }
    .ascii-logo pre {
      display: inline-block;
      text-align: left;
    }
    /* Плейсхолдер загрузки картинки */
    .img-placeholder {
      background: #111;
      border: 1px dashed var(--accent);
      padding: 20px;
      text-align: center;
      color: var(--accent);
      font-size: 12px;
      margin: 10px 0;
    }
    /* Активный контакт в чате */
    .active-contact {
      background: var(--accent);
      color: #000;
      font-weight: bold;
      text-shadow: none;
    }
    /* Увеличенное фото без лишних рамок */
    .full-image-modal {
      text-align: center;
    }
    .full-image-modal img {
      max-width: 100%;
      max-height: 80vh;
      border: 2px solid var(--accent);
      background: #000;
    }
    /* Readonly поле для игрока */
    .readonly-field {
      background: #0a0a0a;
      color: #777;
      cursor: not-allowed;
      resize: none;
    }
    @media (max-width: 600px) {
      .container {
        padding: 12px;
      }
      .menu-grid {
        grid-template-columns: 1fr;
        gap: 10px;
        margin: 20px auto;
      }
      button {
        padding: 12px;
        font-size: 1rem;
        width: 100%;
        margin: 4px 0;
      }
      .chat-container {
        flex-direction: column;
      }
      .contacts {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #333;
        display: flex;
        justify-content: space-around;
      }
      .contacts div {
        text-align: center;
        flex: 1;
      }
      .message {
        max-width: 90%;
        font-size: 0.9rem;
      }
      .input-area select, .input-area input, .input-area button {
        width: 100%;
        margin: 5px 0;
      }
      .input-area {
        display: flex;
        flex-direction: column;
      }
      .input-area select {
        width: 100%;
      }
      .input-area input {
        width: 100%;
      }
      .modal-content {
        padding: 15px;
      }
      .ascii-logo {
        font-size: 7px;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <div><span class="accent">[БИАР]</span> БЮРО ИССЛЕДОВАНИЙ АНОМАЛИЙ РОССИИ — v3.6</div>
  <div><span id="current-time"></span></div>
</div>

<div class="container">
  <div id="login-section">
    <div style="text-align:center; margin-top:80px;">
      <h1 class="accent" style="font-size:28px;">БЮРО ИССЛЕДОВАНИЙ АНОМАЛИЙ РОССИИ</h1>
      <p style="margin:20px 0;">ДОСТУП К АРХИВУ РАЗРЕШЁН ТОЛЬКО АВТОРИЗОВАННЫМ АГЕНТАМ</p>
      <div style="max-width:420px; margin:40px auto;">
        <input type="text" id="login-input" placeholder="Код агента" autocomplete="off"><br>
        <input type="password" id="pass-input" placeholder="Пароль"><br>
        <button id="login-btn">ВХОД В СИСТЕМУ</button>
      </div>
      <div style="font-size:11px; color:#444;">ЗАЩИЩЁННЫЙ ВХОД • ТОЛЬКО ДЛЯ СОТРУДНИКОВ</div>
    </div>
  </div>
  <div id="main-section" class="hidden">
    <div id="main-content"></div>
  </div>
</div>

<div id="modal" class="modal"><div class="modal-content" id="modal-content"></div></div>
<div id="security-footer" class="security-ticker">СЕТЬ ШИФРУЕТСЯ • AES-256 • ЗАЩИЩЁННЫЙ СЕРВЕР</div>

<script>
  (function() {
    const SUPABASE_URL = "https://xfyppmvvobskdmksqnir.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_MoW2nFpIaGZIQwEsKjQubw_T0ko9O7q";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const users = {
      "AT2167": { hash: CryptoJS.SHA256("AAF2615w").toString(), role: "player", name: "ANDREY TOCHILIN" },
      "Admin": { hash: CryptoJS.SHA256("kawasaki").toString(), role: "admin", name: "ADMINISTRATOR" }
    };
    let currentUser = null;

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function showModal(content, onOpen, onClose) {
      const modal = document.getElementById('modal');
      const modalContent = document.getElementById('modal-content');
      modalContent.innerHTML = content + `<br><br><button id="modal-close-btn">ЗАКРЫТЬ</button>`;
      modal.style.display = 'flex';
      if (onOpen) onOpen();
      document.getElementById('modal-close-btn').onclick = () => {
        modal.style.display = 'none';
        if (onClose) onClose();
      };
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    // Увеличенное фото (без лишних рамок, зелёная обводка)
    function showFullImage(src, onCloseCallback) {
      showModal(`<div class="full-image-modal"><img src="${escapeHtml(src)}" style="max-width:100%; max-height:80vh; border:2px solid var(--accent); background:#000;"></div>`, null, () => {
        if (onCloseCallback) onCloseCallback();
      });
    }

    function showLoading(callback) {
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.innerHTML = `<div>ЗАПУСК ПРОТОКОЛА ДОСТУПА...</div><div style="width:300px; height:20px; border:1px solid #0f0; margin-top:20px;"><div style="width:0%; height:100%; background:#0f0; animation: fillAnim 0.8s ease-out forwards;"></div></div><div style="margin-top:15px;">ДЕШИФРОВАНИЕ КЛЮЧЕЙ...</div><style> @keyframes fillAnim { 0% { width:0%; } 100% { width:100%; } } </style>`;
      document.body.appendChild(overlay);
      setTimeout(() => { overlay.remove(); callback(); }, 1000);
    }

    // === РАБОТА С БАЗОЙ ===
    async function fetchArticles() {
      const { data, error } = await supabase.from('articles').select('*').order('id', { ascending: false });
      if (error) { console.error(error); return []; }
      return data;
    }
    async function addArticle(article) {
      console.log("Добавление статьи:", article);
      const { data, error } = await supabase.from('articles').insert(article).select();
      if (error) {
        console.error("Ошибка Supabase:", error);
        showModal(`<h2>Ошибка сохранения</h2><p>${escapeHtml(error.message)}</p><p>Смотрите консоль (F12).</p>`);
        return false;
      }
      console.log("Успешно добавлено:", data);
      return true;
    }
    async function updateArticle(id, updates) {
      const { error } = await supabase.from('articles').update(updates).eq('id', id);
      if (error) console.error(error);
    }
    async function deleteArticle(id) {
      const { error } = await supabase.from('articles').delete().eq('id', id);
      if (error) console.error(error);
    }
    async function fetchMessages(contact) {
      const { data, error } = await supabase.from('messages').select('*').eq('contact', contact).order('id', { ascending: true });
      if (error) return [];
      return data;
    }
    async function sendMessageToDB(contact, from, text) {
      await supabase.from('messages').insert({ id: Date.now(), contact, from_sender: from, text, time: '' });
    }
    async function deleteMessageFromDB(id) { await supabase.from('messages').delete().eq('id', id); }

    function deniedAccess() {
      showModal(`<h2>ДОСТУП ОТКЛОНЁН</h2><p>Недостаточный уровень доступа.</p>`);
    }

    // ASCII-арт логотип с центрированием
    function getAsciiLogo() {
      return `
        <div class="ascii-logo">
          <pre>
+--------------------------------------------------+
|   ██████╗ ██╗ █████╗ ██████╗                     |
|   ██╔══██╗██║██╔══██╗██╔══██╗                    |
|   ██████╔╝██║███████║██████╔╝                    |
|   ██╔══██╗██║██╔══██║██╔══██╗                    |
|   ██████╔╝██║██║  ██║██║  ██║                    |
|   ╚═════╝ ╚═╝╚═╝  ╚═╝╚═╝  ╚═╝                    |
|   БЮРО ИССЛЕДОВАНИЙ АНОМАЛИЙ РОССИИ               |
+--------------------------------------------------+
          </pre>
        </div>
      `;
    }

    // === ОСНОВНОЙ ИНТЕРФЕЙС ===
    function showHome() {
      const mainContent = document.getElementById('main-content');
      const isAdmin = currentUser.role === 'admin';
      let menuButtons = '';
      if (isAdmin) {
        menuButtons = `
          <button id="archive-btn">▸ АРХИВ ДОКУМЕНТОВ</button>
          <button id="account-btn">▸ АККАУНТ</button>
          <button id="chat-btn">▸ СВЯЗЬ</button>
          <button id="logout-btn">▸ ВЫХОД ИЗ СИСТЕМЫ</button>
          <button id="admin-btn">▸ АДМИН-ПАНЕЛЬ</button>
        `;
      } else {
        // Для игрока: порядок: АРХИВ, АККАУНТ, СВЯЗЬ, ЗАПИСЬ, КАРТА, ВЫХОД, КОНТАКТЫ (выход после карты)
        menuButtons = `
          <button id="archive-btn">▸ АРХИВ ДОКУМЕНТОВ</button>
          <button id="account-btn">▸ АККАУНТ</button>
          <button id="chat-btn">▸ СВЯЗЬ</button>
          <button id="record-btn">▸ ЗАПИСЬ</button>
          <button id="map-btn">▸ КАРТА</button>
          <button id="logout-btn">▸ ВЫХОД ИЗ СИСТЕМЫ</button>
          <button id="contacts-btn">▸ КОНТАКТЫ</button>
        `;
      }
      mainContent.innerHTML = `
        ${getAsciiLogo()}
        <h2 style="text-align:center;">ТЕРМИНАЛ БИАР</h2>
        <p style="text-align:center;">Уровень доступа: ${isAdmin ? 'M5 — Полный' : 'M2'}</p>
        <div class="menu-grid">
          ${menuButtons}
        </div>
        <div class="status-bar" style="margin-top:20px;">🔒 СЕАНС АКТИВЕН • ПРОТОКОЛ АУДИТА ВКЛЮЧЁН</div>
      `;
      document.getElementById('archive-btn').onclick = () => showArchive();
      document.getElementById('account-btn').onclick = () => showAccount();
      document.getElementById('chat-btn').onclick = () => showChat();
      document.getElementById('logout-btn').onclick = () => { currentUser = null; document.getElementById('login-section').classList.remove('hidden'); document.getElementById('main-section').classList.add('hidden'); };
      if (isAdmin) {
        document.getElementById('admin-btn').onclick = () => showAdmin();
      } else {
        document.getElementById('record-btn').onclick = () => deniedAccess();
        document.getElementById('map-btn').onclick = () => deniedAccess();
        document.getElementById('contacts-btn').onclick = () => deniedAccess();
      }
    }

    function showAccount() {
      showModal(`
        <h2>ПРОФИЛЬ АГЕНТА</h2>
        <div class="profile-photo"><div style="font-size:32px;">🖼️</div><span>Фото изъято</span><span style="font-size:9px;">по решению комиссии №23-А</span></div>
        <p><strong>Имя:</strong> ${escapeHtml(currentUser.name)}</p>
        <p><strong>Должность:</strong> Агент по устранению аномалий</p>
        <p><strong>Уровень доступа:</strong> ${currentUser.role === 'admin' ? 'M5 (Администратор)' : 'M2'}</p>
        <p><strong>Статус:</strong> <span style="color:#ffaa00;">Пропал без вести</span></p>
        <p><strong>Гриф секретности:</strong> Особой важности</p>
      `);
    }

    async function showArchive() {
      const mainContent = document.getElementById('main-content');
      const articles = await fetchArticles();
      mainContent.innerHTML = `
        <button id="back-home" class="back-btn">← НАЗАД НА ГЛАВНУЮ</button>
        <h2>ПОИСК В АРХИВЕ</h2>
        <input type="text" id="search-code" placeholder="Введите код доступа"><br>
        <button id="search-btn">НАЧАТЬ ПОИСК</button>
        ${currentUser.role === 'admin' ? `<br><br><h3>Всего статей: ${articles.length}</h3>` : ''}
        <div class="status-bar" style="margin-top:20px;">🔒 ДОКУМЕНТЫ ЗАШИФРОВАНЫ • ДОСТУП ПО КОДУ</div>
      `;
      document.getElementById('back-home').onclick = () => showHome();
      document.getElementById('search-btn').onclick = async () => {
        const code = document.getElementById('search-code').value.trim().toUpperCase();
        const article = articles.find(a => a.code.toUpperCase() === code);
        if (article) {
          const showArticleModal = (art) => {
            let imagesHtml = '';
            if (art.images && art.images.length) {
              for (let src of art.images) {
                const imgId = 'img_' + Date.now() + '_' + Math.random();
                imagesHtml += `
                  <div id="${imgId}" class="img-placeholder">[ ЗАГРУЗКА ИЗОБРАЖЕНИЯ ... ]</div>
                  <script>
                    (function() {
                      const img = new Image();
                      img.onload = function() {
                        const container = document.getElementById('${imgId}');
                        if (container) {
                          container.innerHTML = '<img src="${escapeHtml(src)}" style="max-width:100%; margin:10px 0; cursor:pointer;" class="article-img" data-src="${escapeHtml(src)}">';
                          const newImg = container.querySelector('.article-img');
                          if (newImg) {
                            newImg.onclick = (e) => {
                              e.stopPropagation();
                              showFullImage(newImg.getAttribute('data-src'), () => showArticleModal(art));
                            };
                          }
                        }
                      };
                      img.onerror = function() {
                        const container = document.getElementById('${imgId}');
                        if (container) container.innerHTML = '<div style="color:#f00;">[ ОШИБКА ЗАГРУЗКИ ИЗОБРАЖЕНИЯ ]</div>';
                      };
                      img.src = "${escapeHtml(src)}";
                    })();
                  <\/script>
                `;
              }
            }
            let adminBtns = currentUser.role === 'admin' ? '<button id="delete-article-btn">Удалить статью</button>' : '';
            showModal(`
              <h2>${escapeHtml(art.title)}</h2>
              <p><strong>Код:</strong> ${escapeHtml(art.code)}</p>
              <p>${escapeHtml(art.text).replace(/\n/g, '<br>')}</p>
              ${imagesHtml}
              ${adminBtns}
            `, () => {
              if (currentUser.role === 'admin') {
                const delBtn = document.getElementById('delete-article-btn');
                if (delBtn) delBtn.onclick = async () => { await deleteArticle(art.id); closeModal(); showArchive(); };
              }
            });
          };
          showArticleModal(article);
        } else showModal("КОД НЕ НАЙДЕН В АРХИВЕ");
      };
    }

    let currentChatContact = "ADMIN";
    async function showChat() {
      const mainContent = document.getElementById('main-content');
      const isPlayer = currentUser.role === 'player';
      // Для игрока имитация поля ввода с сообщением
      const inputAreaHtml = isPlayer ? `
        <div class="input-area">
          <textarea class="readonly-field" rows="2" readonly style="resize:none; background:#0a0a0a; color:#777;">Ответы недоступны в связи с заморозкой аккаунта. Диалоги находятся в режиме архива.</textarea>
        </div>
      ` : `
        <div class="input-area">
          <select id="sender-select" style="width:30%; display:${currentUser.role==='admin'?'inline-block':'none'}">
            <option value="ADMIN">От ADMIN</option>
            <option value="SI4015">От SI4015</option>
            <option value="ANDREY TOCHILIN">От ANDREY TOCHILIN</option>
          </select>
          <input type="text" id="chat-input" placeholder="Сообщение..." style="width:50%;">
          <button id="send-msg-btn">ОТПРАВИТЬ</button>
        </div>
      `;
      mainContent.innerHTML = `
        <button id="back-home-chat" class="back-btn">← НАЗАД НА ГЛАВНУЮ</button>
        <h2>ЗАЩИЩЁННЫЙ КАНАЛ СВЯЗИ</h2>
        <div class="chat-container">
          <div class="contacts">
            <div id="contact-admin" style="padding:14px; cursor:pointer;">ADMIN</div>
            <div id="contact-si" style="padding:14px; cursor:pointer;">SI4015</div>
          </div>
          <div class="chat-area">
            <div class="messages" id="messages"></div>
            ${inputAreaHtml}
          </div>
        </div>
      `;
      document.getElementById('back-home-chat').onclick = () => showHome();
      const adminDiv = document.getElementById('contact-admin');
      const siDiv = document.getElementById('contact-si');
      adminDiv.onclick = () => openChat('ADMIN');
      siDiv.onclick = () => openChat('SI4015');
      if (!isPlayer) {
        document.getElementById('send-msg-btn').onclick = () => sendMessage();
        document.getElementById('chat-input').addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });
      }
      await openChat('ADMIN');
    }

    async function openChat(contact) {
      currentChatContact = contact;
      // Подсветка активного контакта
      const adminDiv = document.getElementById('contact-admin');
      const siDiv = document.getElementById('contact-si');
      if (adminDiv && siDiv) {
        if (contact === 'ADMIN') {
          adminDiv.classList.add('active-contact');
          siDiv.classList.remove('active-contact');
        } else {
          siDiv.classList.add('active-contact');
          adminDiv.classList.remove('active-contact');
        }
      }
      const messagesDiv = document.getElementById('messages');
      if (!messagesDiv) return;
      const msgs = await fetchMessages(contact);
      let html = '';
      msgs.forEach(msg => {
        const cls = msg.from_sender === "ADMIN" ? "admin" : msg.from_sender === "SI4015" ? "si" : "player";
        const delBtn = currentUser.role === 'admin' ? `<button class="delete-msg-btn" data-id="${msg.id}">✕</button>` : '';
        html += `<div class="message ${cls}"><strong>${escapeHtml(msg.from_sender)}:</strong> ${escapeHtml(msg.text)} ${delBtn}</div>`;
      });
      messagesDiv.innerHTML = html;
      if (currentUser.role === 'admin') {
        document.querySelectorAll('.delete-msg-btn').forEach(btn => {
          btn.onclick = async (e) => {
            e.stopPropagation();
            if (confirm("Удалить сообщение?")) {
              await deleteMessageFromDB(parseInt(btn.getAttribute('data-id')));
              await openChat(currentChatContact);
            }
          };
        });
      }
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      const senderSelect = document.getElementById('sender-select');
      const sender = senderSelect ? senderSelect.value : (currentUser.role === 'admin' ? 'ADMIN' : currentUser.name);
      await sendMessageToDB(currentChatContact, sender, text);
      await openChat(currentChatContact);
      input.value = '';
    }

    async function showAdmin() {
      const mainContent = document.getElementById('main-content');
      const articles = await fetchArticles();
      let html = `<button id="back-home-admin" class="back-btn">← НАЗАД НА ГЛАВНУЮ</button><h2>АДМИН-ПАНЕЛЬ</h2><button id="create-article-btn">+ Создать статью</button><br><br>`;
      articles.forEach(a => {
        html += `<div style="border:1px solid #444; padding:15px; margin:10px 0;">
          <strong>${escapeHtml(a.code)}</strong> — ${escapeHtml(a.title)}
          <button class="edit-article-btn" data-id="${a.id}" style="float:right; margin-left:8px;">Ред</button>
          <button class="del-article-btn" data-id="${a.id}" style="float:right;">Удалить</button>
        </div>`;
      });
      mainContent.innerHTML = html;
      document.getElementById('back-home-admin').onclick = () => showHome();
      document.getElementById('create-article-btn').onclick = () => createArticleForm();
      document.querySelectorAll('.edit-article-btn').forEach(btn => {
        btn.onclick = () => editArticle(parseInt(btn.getAttribute('data-id')));
      });
      document.querySelectorAll('.del-article-btn').forEach(btn => {
        btn.onclick = async () => { if(confirm("Удалить?")) { await deleteArticle(parseInt(btn.getAttribute('data-id'))); showAdmin(); } };
      });
    }

    function createArticleForm() {
      showModal(`
        <h2>Новая статья</h2>
        <input id="new-code" placeholder="Код (например, X-1234)"><br>
        <input id="new-title" placeholder="Заголовок"><br>
        <textarea id="new-text" rows="7" placeholder="Текст..."></textarea><br>
        <input id="new-image1" placeholder="Ссылка на фото 1 (необязательно)"><br>
        <input id="new-image2" placeholder="Ссылка на фото 2 (необязательно)"><br>
        <button id="save-new-btn">Сохранить</button>
      `,
      () => {
        const saveBtn = document.getElementById('save-new-btn');
        if (saveBtn) {
          saveBtn.onclick = async () => {
            const code = document.getElementById('new-code').value.trim();
            const title = document.getElementById('new-title').value.trim();
            const text = document.getElementById('new-text').value.trim();
            if (!code || !title || !text) {
              alert("Заполните код, заголовок и текст");
              return;
            }
            const images = [];
            const img1 = document.getElementById('new-image1').value.trim();
            const img2 = document.getElementById('new-image2').value.trim();
            if (img1) images.push(img1);
            if (img2) images.push(img2);
            const newArticle = {
              id: Date.now(),
              code: code,
              title: title,
              text: text,
              images: images,
              date: new Date().toISOString().split('T')[0]
            };
            const success = await addArticle(newArticle);
            if (success) {
              closeModal();
              showAdmin();
            }
          };
        }
      });
    }

    async function editArticle(id) {
      const articles = await fetchArticles();
      const a = articles.find(x => x.id === id);
      if (!a) return;
      showModal(`
        <h2>Редактирование</h2>
        <input id="edit-code" value="${escapeHtml(a.code)}"><br>
        <input id="edit-title" value="${escapeHtml(a.title)}"><br>
        <textarea id="edit-text" rows="8">${escapeHtml(a.text)}</textarea><br>
        <input id="edit-image1" value="${escapeHtml(a.images?.[0]||'')}" placeholder="Ссылка на фото 1"><br>
        <input id="edit-image2" value="${escapeHtml(a.images?.[1]||'')}" placeholder="Ссылка на фото 2"><br>
        <button id="save-edit-btn">Сохранить изменения</button>
      `,
      () => {
        const saveBtn = document.getElementById('save-edit-btn');
        if (saveBtn) {
          saveBtn.onclick = async () => {
            const images = [];
            const img1 = document.getElementById('edit-image1').value.trim();
            const img2 = document.getElementById('edit-image2').value.trim();
            if (img1) images.push(img1);
            if (img2) images.push(img2);
            await updateArticle(id, {
              code: document.getElementById('edit-code').value.trim(),
              title: document.getElementById('edit-title').value.trim(),
              text: document.getElementById('edit-text').value.trim(),
              images: images
            });
            closeModal();
            showAdmin();
          };
        }
      });
    }

    document.getElementById('login-btn').onclick = async () => {
      const login = document.getElementById('login-input').value.trim();
      const password = document.getElementById('pass-input').value.trim();
      const user = users[login];
      if (user && CryptoJS.SHA256(password).toString() === user.hash) {
        currentUser = { login, role: user.role, name: user.name };
        if (currentUser.role === 'player') {
          showLoading(() => {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            showHome();
          });
        } else {
          document.getElementById('login-section').classList.add('hidden');
          document.getElementById('main-section').classList.remove('hidden');
          showHome();
        }
      } else alert("НЕВЕРНЫЙ КОД АГЕНТА ИЛИ ПАРОЛЬ");
    };

    setInterval(() => {
      const el = document.getElementById('current-time');
      if (el) el.textContent = new Date().toLocaleString('ru-RU');
    }, 1000);
    const tickerMessages = [
      "СЕТЬ ШИФРУЕТСЯ • AES-256 • ЗАЩИЩЁННЫЙ СЕРВЕР",
      "ВНЕШНИЕ КАНАЛЫ ЗАБЛОКИРОВАНЫ • ПРОСЛУШКА НЕВОЗМОЖНА",
      "КЛЮЧИ ОБНОВЛЕНЫ • ПРОТОКОЛ M-5",
      "ПОПЫТКА НЕСАНКЦИОНИРОВАННОГО ДОСТУПА ЗАФИКСИРОВАНА",
      "СИСТЕМА АНТИ-ФИШИНГ АКТИВНА"
    ];
    let idx = 0;
    setInterval(() => {
      const footer = document.getElementById('security-footer');
      if (footer) footer.textContent = tickerMessages[idx % tickerMessages.length] + " • " + new Date().toLocaleTimeString();
      idx++;
    }, 10000);
  })();
</script>
</body>
</html>
