<!DOCTYPE html>
<html lang="ru">
<head>

    body {
      background: var(--bg);
      color: var(--gray);
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      line-height: 1.4;
    }
    .header {
      background: #0a0a0a;
      padding: 8px 15px;
      border-bottom: 1px solid var(--accent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }
    .accent { color: var(--accent); text-shadow: 0 0 5px var(--accent); }
    .container { padding: 20px; height: calc(100vh - 52px); overflow-y: auto; }

    button {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 10px 16px;
      cursor: pointer;
      font-family: inherit;
      margin: 5px;
      transition: all 0.2s;
    }
    button:hover { background: var(--accent); color: #000; }

    input, textarea, select {
      background: #111;
      border: 1px solid #444;
      color: var(--gray);
      padding: 10px;
      width: 100%;
      font-family: inherit;
      margin: 8px 0;
    }

    .modal {
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.97);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 10px;
    }
    .modal-content {
      background: #111;
      border: 1px solid var(--accent);
      padding: 25px;
      max-width: 720px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 0 20px var(--accent);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      max-width: 700px;
      margin: 40px auto;
    }

    .back-btn {
      margin-bottom: 15px;
    }

    /* Р§РђРў */
    .chat-container {
      display: flex;
      height: 65vh;
      border: 1px solid var(--accent);
      background: #0f0f0f;
    }
    .contacts {
      width: 240px;
      border-right: 1px solid #333;
      padding: 10px;
      background: #111;
    }
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #0a0a0a;
    }
    .message {
      margin: 10px 0;
      padding: 8px 12px;
      border-radius: 4px;
      max-width: 75%;
      position: relative;
    }
    .message.admin { background: #002200; color: #00ff88; }
    .message.si { background: #001122; color: #88ccff; }
    .message.player { background: #221100; color: #ffcc88; align-self: flex-end; text-align: right; }
    .input-area {

      border-top: 1px solid #333;
      background: #111;
    }
    .status-bar {
      text-align: center;
      padding: 8px;
      background: #111;
      font-size: 13px;
      color: var(--accent);
      border-top: 1px solid var(--accent);
    }

    @media (max-width: 600px) {
      .menu-grid { grid-template-columns: 1fr; }
      button { display: block; width: 100%; margin: 8px 0; }
      .chat-container { flex-direction: column; }
      .contacts { width: 100%; border-right: none; border-bottom: 1px solid #333; }
    }
  </style>
</head>

<script>

  {id:3, code:"R-5541", title:"РђСЂС‚РµС„Р°РєС‚ R-5541 В«Р—РµСЂРєР°Р»РѕВ»", text:"РћС‚СЂР°Р¶Р°РµС‚ РЅРµ С‚РѕРіРѕ, РєС‚Рѕ СЃРјРѕС‚СЂРёС‚...", images:["https://picsum.photos/800/400?random=2"], date:"2025-11-20"}

  "SI4015": [{from: "SI4015", text: "РќСѓР¶РЅР° РІР°С€Р° РїРѕРјРѕС‰СЊ РїРѕ РїСЂРѕС‚РѕРєРѕР»Сѓ P-112.", time: "09:17"}]

// ==================== РЎРўР РђРќРР¦Р« ====================
function showPage(page) {

          <input type="password" id="pass" placeholder="РџР°СЂРѕР»СЊ" style="margin-bottom:12px;"><br>
          <button onclick="login()" style="width:100%; padding:14px;">Р’РҐРћР” Р’ РЎРРЎРўР•РњРЈ</button>
        </div>
      </div>
    `;
  } else if (page === 'home') {
    app.innerHTML = `
      <h2 style="text-align:center;">Р”РћР‘Р Рћ РџРћР–РђР›РћР’РђРўР¬, РђР“Р•РќРў <span class="accent">${currentUser.name}</span></h2>
      <p style="text-align:center;">РЈСЂРѕРІРµРЅСЊ РґРѕСЃС‚СѓРїР°: ${currentUser.role === 'admin' ? 'M5 вЂ” РџРѕР»РЅС‹Р№' : 'M2'}</p>
      <div class="menu-grid">
        <button onclick="showArchive()">РђР РҐРР’ Р”РћРљРЈРњР•РќРўРћР’</button>
        <button onclick="showAccount()">РђРљРљРђРЈРќРў</button>
        <button onclick="showChat()">РЎР’РЇР—Р¬</button>
        <button onclick="deniedAccess()">Р—РђРџРРЎР¬</button>
        <button onclick="deniedAccess()">РљРђР РўРђ</button>
        <button onclick="deniedAccess()">РљРћРќРўРђРљРўР«</button>
        ${currentUser.role === 'admin' ? `<button onclick="showAdmin()">РђР”РњРРќ-РџРђРќР•Р›Р¬</button>` : ''}
        <button onclick="logout()">Р’Р«РҐРћР” РР— РЎРРЎРўР•РњР«</button>
      </div>
    `;
  }
}

function login() {
  const l = document.getElementById('login').value.trim();
  const p = document.getElementById('pass').value.trim();
  if (users[l] && users[l].password === p) {
    currentUser = { login: l, ...users[l] };
    showPage('home');
  } else alert("РќР•Р’Р•Р РќР«Р™ РљРћР” РђР“Р•РќРўРђ РР›Р РџРђР РћР›Р¬");
}

function logout() {
  if (confirm("Р’С‹Р№С‚Рё РёР· СЃРёСЃС‚РµРјС‹?")) {
    currentUser = null;
    showPage('login');
  }
}

function deniedAccess() {
  showModal(`<h2>Р”РћРЎРўРЈРџ РћРўРљР›РћРќРЃРќ</h2><p>РќРµРґРѕСЃС‚Р°С‚РѕС‡РЅС‹Р№ СѓСЂРѕРІРµРЅСЊ РґРѕСЃС‚СѓРїР°.</p>`);
}

// ==================== РђР РҐРР’ ====================
function showArchive() {
  const app = document.getElementById('app');
  let html = `
    <button class="back-btn" onclick="showPage('home')">в†ђ РќРђР—РђР” РќРђ Р“Р›РђР’РќРЈР®</button>
    <h2>РџРћРРЎРљ Р’ РђР РҐРР’Р•</h2>
    <input type="text" id="search-code" placeholder="Р’РІРµРґРёС‚Рµ РєРѕРґ РґРѕСЃС‚СѓРїР°" style="margin:15px 0;">
    <button onclick="searchArticle()">РќРђР§РђРўР¬ РџРћРРЎРљ</button>`;

  if (currentUser.role === 'admin') {
    html += `<br><br><h3>Р’СЃРµРіРѕ СЃС‚Р°С‚РµР№: ${articles.length}</h3>`;
  }
  app.innerHTML = html;
}

function searchArticle() {
  const code = document.getElementById('search-code').value.trim().toUpperCase();
  const article = articles.find(a => a.code.toUpperCase() === code);
  
  if (article) {
    let imgHtml = article.images.map(src => `<img src="${src}" style="max-width:100%; margin:10px 0; border:1px solid #444;" onclick="this.style.maxHeight='none'">`).join('');
    showModal(`
      <div class="article">
        <h2>${article.title}</h2>
        <p><strong>РљРѕРґ:</strong> ${article.code} | <strong>Р”Р°С‚Р°:</strong> ${article.date}</p>
        <p>${article.text}</p>
        ${imgHtml}
      </div>
      ${currentUser.role === 'admin' ? `<button onclick="deleteArticle(${article.id});closeModal()">РЈРґР°Р»РёС‚СЊ СЃС‚Р°С‚СЊСЋ</button>` : ''}
    `);
  } else {
    showModal("РљРћР” РќР• РќРђР™Р”Р•Рќ Р’ РђР РҐРР’Р•");
  }
}

// ==================== Р§РђРў ====================
function showChat() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <button class="back-btn" onclick="showPage('home')">в†ђ РќРђР—РђР” РќРђ Р“Р›РђР’РќРЈР®</button>
    <h2>Р—РђР©РР©РЃРќРќР«Р™ РљРђРќРђР› РЎР’РЇР—Р</h2>
    <div class="chat-container">
      <div class="contacts">
        <div onclick="openChat('ADMIN')" style="padding:14px; cursor:pointer; border-bottom:1px solid #333;">ADMIN (Р СѓРєРѕРІРѕРґСЃС‚РІРѕ)</div>
        <div onclick="openChat('SI4015')" style="padding:14px; cursor:pointer;">SI4015 (РџРѕР»РµРІРѕР№ Р°РіРµРЅС‚)</div>
      </div>
      <div class="chat-area">
        <div class="messages" id="messages"></div>
        <div class="input-area">
          <select id="sender-select" style="width:30%; display:${currentUser.role==='admin'?'inline-block':'none'}">
            <option value="ADMIN">РћС‚ ADMIN</option>
            <option value="SI4015">РћС‚ SI4015</option>
            <option value="ANDREY TOCHILIN">РћС‚ ANDREY TOCHILIN</option>
          </select>
          <input type="text" id="chat-input" placeholder="РЎРѕРѕР±С‰РµРЅРёРµ..." style="width:50%;">
          <button onclick="sendMessage()">РћРўРџР РђР’РРўР¬</button>
        </div>
        <div class="status-bar">РЎРµС‚СЊ Р·Р°С‰РёС‰С‘РЅРЅРѕР№ СЃРІСЏР·Рё вЂў РЈСЂРѕРІРµРЅСЊ С€РёС„СЂРѕРІР°РЅРёСЏ: A-7</div>
      </div>
    </div>
  `;
  openChat('ADMIN');
}

let currentChatContact = "ADMIN";

function openChat(contact) {
  currentChatContact = contact;
  const area = document.getElementById('messages');
  let html = '';
  (messagesDB[contact] || []).forEach((m, index) => {
    const cls = m.from === "ADMIN" ? "admin" : m.from === "SI4015" ? "si" : "player";
    html += `
      <div class="message ${cls}">
        <strong>${m.from}:</strong> ${m.text} <small>(${m.time})</small>
        ${currentUser.role === 'admin' ? `<button onclick="deleteMessage('${contact}', ${index})" style="font-size:10px; padding:2px 6px; float:right;">вњ•</button>` : ''}
      </div>`;
  });
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

function deleteMessage(contact, index) {
  if (confirm("РЈРґР°Р»РёС‚СЊ СЃРѕРѕР±С‰РµРЅРёРµ?")) {
    messagesDB[contact].splice(index, 1);
    saveMessages();
    openChat(contact);
  }
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  if (currentUser.role === 'player') {
    showModal(`<h2>РЎР’РЇР—Р¬ РћРўРљР›Р®Р§Р•РќРђ</h2><p>РЎРІСЏР·СЊ РѕС‚РєР»СЋС‡РµРЅР° РІ СЃРІСЏР·Рё СЃ РїСЂРѕРїР°Р¶РµР№ Р°РіРµРЅС‚Р°.</p>`);
    input.value = '';
    return;
  }

  const sender = document.getElementById('sender-select').value;

  if (!messagesDB[currentChatContact]) messagesDB[currentChatContact] = [];

  messagesDB[currentChatContact].push({
    from: sender,
    text: text,
    time: new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})
  });

  saveMessages();
  openChat(currentChatContact);
  input.value = '';
}

// ==================== РџР РћР¤РР›Р¬ Р РђР”РњРРќ ====================
function showAccount() {
  showModal(`
    <h2>РџР РћР¤РР›Р¬ РђР“Р•РќРўРђ</h2>
    <p><strong>РРјСЏ:</strong> ${currentUser.name}</p>
    <p><strong>Р”РѕР»Р¶РЅРѕСЃС‚СЊ:</strong> РђРіРµРЅС‚ РїРѕ СѓСЃС‚СЂР°РЅРµРЅРёСЋ Р°РЅРѕРјР°Р»РёР№</p>
    <p><strong>РЈСЂРѕРІРµРЅСЊ РґРѕСЃС‚СѓРїР°:</strong> ${currentUser.role === 'admin' ? 'M5 (РђРґРјРёРЅРёСЃС‚СЂР°С‚РѕСЂ)' : 'M2'}</p>
    <p><strong>РЎС‚Р°С‚СѓСЃ:</strong> РџСЂРѕРїР°Р» Р±РµР· РІРµСЃС‚Рё</p>
  `);
}

function showAdmin() { /* РєРѕРґ Р°РґРјРёРЅРєРё Р±РµР· РёР·РјРµРЅРµРЅРёР№ */ 
  let html = `<h2>РђР”РњРРќ-РџРђРќР•Р›Р¬</h2><button onclick="createArticleForm()">+ РЎРѕР·РґР°С‚СЊ РЅРѕРІСѓСЋ СЃС‚Р°С‚СЊСЋ</button><br><br>`;
  articles.forEach(a => {
    html += `<div style="border:1px solid #444; padding:15px; margin:10px 0;">
      <strong>${a.code}</strong> вЂ” ${a.title}
      <button onclick="editArticle(${a.id})" style="float:right; margin-left:8px;">Р РµРґР°РєС‚РёСЂРѕРІР°С‚СЊ</button>
      <button onclick="deleteArticle(${a.id})" style="float:right;">РЈРґР°Р»РёС‚СЊ</button>
    </div>`;
  });
  document.getElementById('app').innerHTML = html;
}

// (РћСЃС‚Р°Р»СЊРЅС‹Рµ С„СѓРЅРєС†РёРё Р°РґРјРёРЅРєРё: createArticleForm, saveNewArticle, editArticle, saveEditedArticle, deleteArticle вЂ” РѕСЃС‚Р°Р»РёСЃСЊ РїСЂРµР¶РЅРёРјРё)

function createArticleForm() {
  showModal(`
    <h2>РЎРѕР·РґР°РЅРёРµ СЃС‚Р°С‚СЊРё</h2>
    <input id="new-code" placeholder="РљРѕРґ"><br>
    <input id="new-title" placeholder="Р—Р°РіРѕР»РѕРІРѕРє"><br>
    <textarea id="new-text" rows="7" placeholder="РўРµРєСЃС‚..."></textarea><br>
    <input id="new-image1" placeholder="РЎСЃС‹Р»РєР° РЅР° С„РѕС‚Рѕ 1"><br>
    <input id="new-image2" placeholder="РЎСЃС‹Р»РєР° РЅР° С„РѕС‚Рѕ 2"><br>
    <button onclick="saveNewArticle()">РЎРѕС…СЂР°РЅРёС‚СЊ СЃС‚Р°С‚СЊСЋ</button>
  `);
}

function saveNewArticle() {
  const code = document.getElementById('new-code').value.trim();
  const title = document.getElementById('new-title').value.trim();
  const text = document.getElementById('new-text').value.trim();
  if (!code || !title || !text) return alert("Р—Р°РїРѕР»РЅРёС‚Рµ РѕР±СЏР·Р°С‚РµР»СЊРЅС‹Рµ РїРѕР»СЏ");

  articles.push({
    id: Date.now(),
    code, title, text,
    images: [document.getElementById('new-image1').value.trim(), document.getElementById('new-image2').value.trim()].filter(Boolean),
    date: new Date().toISOString().split('T')[0]
  });
  saveData();
  closeModal();
  showAdmin();
}

function editArticle(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  showModal(`
    <h2>Р РµРґР°РєС‚РёСЂРѕРІР°РЅРёРµ</h2>
    <input id="edit-code" value="${a.code}"><br>
    <input id="edit-title" value="${a.title}"><br>
    <textarea id="edit-text" rows="8">${a.text}</textarea><br>
    <input id="edit-image1" value="${a.images[0]||''}"><br>
    <input id="edit-image2" value="${a.images[1]||''}"><br>
    <button onclick="saveEditedArticle(${id})">РЎРѕС…СЂР°РЅРёС‚СЊ РёР·РјРµРЅРµРЅРёСЏ</button>
  `);
}

function saveEditedArticle(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  a.code = document.getElementById('edit-code').value.trim();
  a.title = document.getElementById('edit-title').value.trim();
  a.text = document.getElementById('edit-text').value.trim();
  a.images = [
    document.getElementById('edit-image1').value.trim(),
    document.getElementById('edit-image2').value.trim()
  ].filter(Boolean);
  saveData();
  closeModal();
  showAdmin();
}

function deleteArticle(id) {
  if (confirm("РЈРґР°Р»РёС‚СЊ СЃС‚Р°С‚СЊСЋ?")) {
    articles = articles.filter(a => a.id !== id);
    saveData();
    showAdmin();
  }
}

function showModal(content) {
  document.getElementById('modal-content').innerHTML = content + `<br><br><button onclick="closeModal()">Р—РђРљР Р«РўР¬</button>`;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}
