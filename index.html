<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>BIAR</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    /* (все стили без изменений, такие же как в v7.0.4) */
    :root { --bg: #0a0a0a; --accent: #00cc55; --gray: #bbbbbb; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--gray); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
    .header { background: #0a0a0a; padding: 8px 15px; border-bottom: 1px solid var(--accent); display: flex; justify-content: space-between; flex-wrap: wrap; font-size: 0.9rem; }
    .accent { color: var(--accent); text-shadow: 0 0 5px var(--accent); }
    .container { padding: 20px; height: calc(100vh - 52px); overflow-y: auto; }
    button { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 10px 16px; cursor: pointer; font-family: inherit; margin: 5px; transition: 0.2s; font-size: 0.9rem; }
    button:hover { background: var(--accent); color: #000; transform: scale(1.02); }
    input, textarea, select { background: #111; border: 1px solid #444; color: var(--gray); padding: 10px; width: 100%; font-family: inherit; margin: 8px 0; font-size: 1rem; }
    .modal { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.97); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 10px; }
    .modal-content { background: #111; border: 1px solid var(--accent); padding: 25px; max-width: 720px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; max-width: 700px; margin: 40px auto 20px auto; }
    .logout-container { display: flex; justify-content: center; margin-top: 30px; }
    .back-btn { margin-bottom: 15px; }
    .chat-container { display: flex; height: 65vh; border: 1px solid var(--accent); }
    .contacts { width: 240px; border-right: 1px solid #333; padding: 10px; background: #111; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .messages { flex: 1; padding: 15px; overflow-y: auto; background: #0a0a0a; }
    .message { margin: 10px 0; padding: 8px 12px; border-radius: 4px; max-width: 75%; word-wrap: break-word; }
    .message.admin { background: #002200; color: #00ff88; border-left: 3px solid #00ff88; }
    .message.si { background: #001122; color: #88ccff; border-left: 3px solid #88ccff; }
    .message.player, .message.viewer { background: #221100; color: #ffcc88; margin-left: auto; text-align: right; border-right: 3px solid #ffcc88; }
    .input-area { padding: 12px; border-top: 1px solid #333; background: #111; }
    .status-bar { text-align: center; padding: 6px; background: #0a0a0a; font-size: 11px; color: var(--accent); border-top: 1px solid var(--accent); }
    .delete-msg-btn { background: none; border: none; color: #ff5555; font-size: 12px; margin-left: 10px; cursor: pointer; }
    .profile-photo { width: 180px; height: 180px; border: 2px solid var(--accent); background: #1a1a1a; margin: 15px auto; display: flex; align-items: center; justify-content: center; flex-direction: column; font-size: 12px; }
    .security-ticker { position: fixed; bottom: 0; left: 0; width: 100%; background: #000000cc; backdrop-filter: blur(4px); color: #0f0; font-size: 10px; padding: 4px; text-align: center; z-index: 99; border-top: 1px solid var(--accent); white-space: nowrap; overflow-x: auto; }
    .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #0f0; }
    .hidden { display: none; }
    .ascii-logo { text-align: center; margin-bottom: 20px; font-family: monospace; font-size: 12px; line-height: 1.2; color: var(--accent); white-space: pre; }
    .img-placeholder { background: #111; border: 1px dashed var(--accent); padding: 20px; text-align: center; color: var(--accent); font-size: 12px; margin: 10px 0; }
    .loading-bar { width: 100%; height: 4px; background: #333; margin-top: 8px; overflow: hidden; }
    .loading-bar-fill { width: 30%; height: 100%; background: var(--accent); animation: loadingLoop 1s infinite linear; }
    @keyframes loadingLoop { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
    .active-contact { background: var(--accent); color: #000; font-weight: bold; text-shadow: none; }
    .full-image-modal { text-align: center; }
    .full-image-modal img { max-width: 100%; max-height: 80vh; border: 2px solid var(--accent); background: #000; }
    .readonly-field { background: #0a0a0a; color: #777; cursor: not-allowed; resize: none; }
    .file-input { border: 1px solid var(--accent); padding: 8px; background: #111; cursor: pointer; }
    .image-preview { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    .image-preview-item { position: relative; display: inline-block; }
    .image-preview-item img { max-width: 100px; max-height: 100px; border: 1px solid var(--accent); }
    .remove-image, .remove-existing { position: absolute; top: -8px; right: -8px; background: #f00; color: #fff; border-radius: 50%; width: 20px; height: 20px; text-align: center; cursor: pointer; font-size: 12px; line-height: 18px; }
    @media (max-width: 600px) { .container { padding: 12px; } .menu-grid { grid-template-columns: 1fr; gap: 10px; margin: 20px auto; } button { padding: 12px; font-size: 1rem; width: 100%; margin: 4px 0; } .logout-container button { width: auto; min-width: 200px; } .chat-container { flex-direction: column; } .contacts { width: 100%; border-right: none; border-bottom: 1px solid #333; display: flex; justify-content: space-around; } .contacts div { text-align: center; flex: 1; } .message { max-width: 90%; font-size: 0.9rem; } .input-area select, .input-area input, .input-area button { width: 100%; margin: 5px 0; } .input-area { display: flex; flex-direction: column; } .ascii-logo { font-size: 8px; } }
    .delay-banner { background: #1a1a1a; border: 1px solid var(--accent); color: var(--accent); padding: 10px 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .delay-banner button { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 4px 12px; cursor: pointer; font-size: 12px; }
    .delay-banner button:hover { background: var(--accent); color: #000; }
  </style>
</head>
<body>

<div class="header">
  <div><span class="accent">[BIAR]</span> БЮРО ИССЛЕДОВАНИЙ АНОМАЛИЙ РОССИИ — v7.0.5</div>
  <div><span id="current-time"></span></div>
</div>

<div class="container">
  <div id="login-section">
    <div style="text-align:center; margin-top:80px;">
      <h1 class="accent" style="font-size:28px;">БЮРО ИССЛЕДОВАНИЙ АНОМАЛИЙ РОССИИ</h1>
      <p style="margin:20px 0;">ДОСТУП К АРХИВУ РАЗРЕШЁН ТОЛЬКО АВТОРИЗОВАННЫМ АГЕНТАМ</p>
      <div style="max-width:420px; margin:40px auto;">
        <input type="text" id="login-input" placeholder="Код агента" autocomplete="off"><br>
        <input type="password" id="pass-input" placeholder="Пароль" autocomplete="off"><br>
        <button id="login-btn">ВХОД В СИСТЕМУ</button>

      <div style="font-size:11px; color:#444;">ЗАЩИЩЁННЫЙ ВХОД • ТОЛЬКО ДЛЯ СОТРУДНИКОВ</div>

<div id="modal" class="modal"><div class="modal-content" id="modal-content"></div></div>
<div id="security-footer" class="security-ticker">СЕТЬ ШИФРУЕТСЯ • AES-256 • ЗАЩИЩЁННЫЙ СЕРВЕР</div>

<script>
  (function() {
    // ========== ОБФУСЦИРОВАННЫЕ ЛОГИНЫ И РОЛИ, ПРАВИЛЬНЫЕ ХЭШИ ==========
    const _users_enc = [
      "AT2167", "player", "ANDREY TOCHILIN",
      "Admin", "admin", "ADMINISTRATOR",
      "W", "viewer", "SEMEN LOBANOV"
    ];
    // Правильные хэши (проверены в консоли)
    const passwordHashes = {
      "AT2167": "be1f4506b29b2465352f725c9302b029ff9b76e95f555c8ff3c6c3b69ea78355",
      "Admin": "e697c5113ce58b708b7c1f31f0423cc021d0bf3aacd3d63865c53a5f817ce278",
      "W": "7c8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8"

    const users = {
      [_users_enc[0]]: { hash: passwordHashes[_users_enc[0]], role: _users_enc[1], name: _users_enc[2] },
      [_users_enc[3]]: { hash: passwordHashes[_users_enc[3]], role: _users_enc[4], name: _users_enc[5] },
      [_users_enc[6]]: { hash: passwordHashes[_users_enc[6]], role: _users_enc[7], name: _users_enc[8] }
    };
    console.log("Users loaded (обфусцированы логины и роли, хэши правильные)");

    const SUPABASE_URL = "https://xfyppmvvobskdmksqnir.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_MoW2nFpIaGZIQwEsKjQubw_T0ko9O7q";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    // ========== БАЗОВЫЕ ФУНКЦИИ ==========
    const STORAGE_BUCKET = "article-images";
    async function uploadImages(files) {
      const uploadedUrls = [];
      for (const file of files) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
        const filePath = `${fileName}`;
        const { error } = await supabase.storage.from(STORAGE_BUCKET).upload(filePath, file, { cacheControl: '3600', upsert: false });
        if (error) { console.error(error); alert(`Ошибка загрузки ${file.name}: ${error.message}`); return null; }
        const { data: publicUrlData } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(filePath);
        uploadedUrls.push(publicUrlData.publicUrl);
      }
      return uploadedUrls;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    function showModal(content, onOpen, onClose) {
      const modal = document.getElementById('modal');
      const modalContent = document.getElementById('modal-content');
      modalContent.innerHTML = content + `<br><br><button id="modal-close-btn">ЗАКРЫТЬ</button>`;
      modal.style.display = 'flex';
      if (onOpen) onOpen();
      document.getElementById('modal-close-btn').onclick = () => {
        modal.style.display = 'none';
        if (onClose) onClose();
      };
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function showFullImage(src, onCloseCallback) {
      showModal(`<div class="full-image-modal"><img src="${escapeHtml(src)}" style="max-width:100%; max-height:80vh; border:2px solid var(--accent); background:#000;"></div>`, null, () => { if (onCloseCallback) onCloseCallback(); });
    }
    function showLoading(callback, looped = false) {
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      const barHtml = `<div style="width:300px; height:20px; border:1px solid #0f0; margin-top:20px;"><div style="width:0%; height:100%; background:#0f0; ${looped ? 'animation: fillLoop 1.5s infinite linear;' : 'animation: fillAnim 0.8s ease-out forwards;'}" id="loading-fill"></div></div>`;
      overlay.innerHTML = `<div>ЗАПУСК ПРОТОКОЛА ДОСТУПА...</div>${barHtml}<div style="margin-top:15px;">ДЕШИФРОВАНИЕ КЛЮЧЕЙ...</div><style>@keyframes fillAnim { 0% { width:0%; } 100% { width:100%; } } @keyframes fillLoop { 0% { width:0%; } 50% { width:100%; } 100% { width:0%; } }</style>`;
      document.body.appendChild(overlay);
      if (!looped) { setTimeout(() => { overlay.remove(); if (callback) callback(); }, 1000); return null; }
      return overlay;
    }
    function hideLoading(overlay) { if (overlay && overlay.remove) overlay.remove(); }
    function deniedAccess() { showModal(`<h2>ДОСТУП ОТКЛОНЁН</h2><p>Недостаточный уровень доступа.</p>`); }

    // ========== РАБОТА СО СТАТЬЯМИ ==========
    async function fetchArticlesForRole() {
      let query = supabase.from('articles').select('*');
      if (currentUser.role === 'player') {
        query = query.or('visible_to_viewer.eq.false,visible_to_viewer.is.null');
      } else if (currentUser.role === 'viewer') {
        query = query.eq('visible_to_viewer', true);
      }
      const { data, error } = await query.order('id', { ascending: false });
      if (error) { console.error(error); showModal(`<h2>Ошибка</h2><p>${escapeHtml(error.message)}</p>`); return []; }
      return data;
    }
    async function fetchAllArticlesForAdmin() {
      const { data, error } = await supabase.from('articles').select('*').order('id', { ascending: false });
      if (error) { console.error(error); return []; }
      return data;
    }
    async function addArticle(article) {
      const toInsert = { ...article, visible_to_viewer: !!article.visible_to_viewer };
      const { error } = await supabase.from('articles').insert(toInsert);
      if (error) { console.error(error); showModal(`<h2>Ошибка сохранения</h2><p>${escapeHtml(error.message)}</p>`); return false; }
      return true;
    }
    async function updateArticle(id, updates) {
      const toUpdate = { ...updates, visible_to_viewer: !!updates.visible_to_viewer };
      const { error } = await supabase.from('articles').update(toUpdate).eq('id', id);
      if (error) console.error(error);
    }
    async function deleteArticle(id) { await supabase.from('articles').delete().eq('id', id); }

    // ========== РАБОТА С ПАСХАЛКАМИ ==========
    async function fetchEasterEggs() {
      const { data, error } = await supabase.from('easter_eggs').select('*').order('id', { ascending: true });
      if (error) {
        console.error(error);
        if (error.code === '42P01') {
          showModal(`<h2>Таблица easter_eggs не найдена</h2><p>Выполните SQL в Supabase:</p><pre style="background:#000; color:#0f0; padding:10px;">CREATE TABLE easter_eggs (
  id BIGINT PRIMARY KEY,
  trigger_type TEXT NOT NULL,
  trigger_value TEXT NOT NULL,
  show_article BOOLEAN DEFAULT false,
  article_text TEXT,
  show_image BOOLEAN DEFAULT false,
  image_url TEXT,
  download_file BOOLEAN DEFAULT false,
  file_url TEXT,
  file_name TEXT,
  is_active BOOLEAN DEFAULT true,
  created_at TIMESTAMP DEFAULT NOW()
);
ALTER TABLE easter_eggs DISABLE ROW LEVEL SECURITY;</pre>`);
        }
        return [];
      }
      return data;
    }
    async function addEasterEgg(egg) {
      const { data, error } = await supabase.from('easter_eggs').insert(egg).select();
      if (error) {
        console.error(error);
        if (error.code === '42501' || error.message.includes('row-level security')) {
          showModal(`<h2>Ошибка прав доступа</h2><p>Нужно отключить RLS для таблицы easter_eggs.</p><p>Выполните в SQL Editor Supabase:</p><pre style="background:#000; color:#0f0; padding:10px;">ALTER TABLE easter_eggs DISABLE ROW LEVEL SECURITY;</pre><p>После этого повторите попытку.</p>`);
        } else {
          showModal(`<h2>Ошибка сохранения пасхалки</h2><p>${escapeHtml(error.message)}</p>`);
        }
        return false;
      }
      return true;
    }
    async function updateEasterEgg(id, updates) {
      const { error } = await supabase.from('easter_eggs').update(updates).eq('id', id);
      if (error) console.error(error);
    }
    async function deleteEasterEgg(id) { await supabase.from('easter_eggs').delete().eq('id', id); }

    // ========== РАБОТА С СООБЩЕНИЯМИ ЧАТА ==========
    async function fetchMessagesForAdminPlayer(contact) {
      const { data, error } = await supabase.from('messages').select('*').eq('contact', contact).order('id', { ascending: true });
      if (error) return [];
      return data;
    }
    async function sendMessageToDB(contact, from, text) { await supabase.from('messages').insert({ id: Date.now(), contact, from_sender: from, text, time: '' }); }
    async function deleteMessageFromDB(id) { await supabase.from('messages').delete().eq('id', id); }
    function getViewerChatMessages(contact) {
      if (contact === 'ADMIN') return [
        { from_sender: "ADMIN", text: "Смотритель, проверьте архивные записи по аномалии ЕК-12.", class: "admin" },
        { from_sender: "SEMEN LOBANOV", text: "Принято. Приступаю к анализу.", class: "viewer" }
      ];
      else return [
        { from_sender: "SI4015", text: "Полевой отчёт: запах капусты сохраняется. Рекомендую изоляцию.", class: "si" },
        { from_sender: "SEMEN LOBANOV", text: "Понял. Готовлю документы для комитета.", class: "viewer" }
      ];
    }

    // ========== ВСПОМОГАТЕЛЬНОЕ ДЛЯ ПАСХАЛОК ==========
    let easterEggs = [];
    let idleTimer = null;
    let idleTimeout = 30;
    let keyCombinationBuffer = '';
    let isEasterTriggered = false;

    function resetIdleTimer() {
      if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
      const idleEgg = easterEggs.find(e => e.trigger_type === 'idle_timeout' && e.is_active === true);
      if (idleEgg) {
        const timeoutSeconds = parseInt(idleEgg.trigger_value) || 30;
        idleTimer = setTimeout(() => {
          if (!isEasterTriggered) {
            triggerEasterEgg(idleEgg);
          }
        }, timeoutSeconds * 1000);
      }
    }

    function triggerEasterEgg(egg) {
      if (isEasterTriggered) return;
      isEasterTriggered = true;
      if (egg.show_article && egg.article_text) {
        showModal(`<div style="background:#000; border:2px solid #ff0000; color:#ff4444; padding:20px; text-shadow:0 0 10px #ff0000;"><h2 style="color:#ff0000;">⚠️ ОБНАРУЖЕНА АНОМАЛИЯ</h2><p>${escapeHtml(egg.article_text).replace(/\n/g, '<br>')}</p></div>`);
      }
      if (egg.show_image && egg.image_url) {
        showFullImage(egg.image_url);
      }
      if (egg.download_file && egg.file_url) {
        const link = document.createElement('a');
        link.href = egg.file_url;
        link.download = egg.file_name || 'аномалия.txt';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }
      setTimeout(() => { isEasterTriggered = false; }, 5000);
    }

    function handleKeyDown(e) {
      const key = e.key;
      if (key.length === 1) {
        keyCombinationBuffer += key.toLowerCase();
        const comboEggs = easterEggs.filter(e => e.trigger_type === 'key_combination' && e.is_active === true);
        for (const egg of comboEggs) {
          const trigger = egg.trigger_value.toLowerCase();
          if (keyCombinationBuffer.endsWith(trigger)) {
            if (!isEasterTriggered) {
              triggerEasterEgg(egg);
            }
            keyCombinationBuffer = '';
            break;
          }
        }
        if (keyCombinationBuffer.length > 20) {
          keyCombinationBuffer = keyCombinationBuffer.slice(-20);
        }
      }
    }

    // ========== ПЛАШКА О ЗАДЕРЖКАХ ==========
    function showDelayBanner() {
      const mainContent = document.getElementById('main-content');
      if (sessionStorage.getItem('delay_banner_hidden')) return;
      const banner = document.createElement('div');
      banner.className = 'delay-banner';
      banner.innerHTML = `
        <span>⚠️ В связи с высокой нагрузкой на сервера возможны задержки при переходе между разделами. Приносим извинения.</span>
        <button id="hide-banner-btn">ПОНЯТНО</button>
      `;
      mainContent.prepend(banner);
      document.getElementById('hide-banner-btn').onclick = () => {
        banner.remove();
        sessionStorage.setItem('delay_banner_hidden', 'true');
      };
    }

    // ========== ASCII-ЛОГО ==========
    function getAsciiLogo() { return `<div class="ascii-logo">\n  ██████╗ ██╗ █████╗ ██████╗ \n  ██╔══██╗██║██╔══██╗██╔══██╗\n  ██████╔╝██║███████║██████╔╝\n  ██╔══██╗██║██╔══██║██╔══██╗\n  ██████╔╝██║██║  ██║██║  ██║\n  ╚═════╝ ╚═╝╚═╝  ╚═╝╚═╝  ╚═╝\n        </div>`; }

    // ========== ОСНОВНОЙ ИНТЕРФЕЙС ==========
    function showHome() {
      const mainContent = document.getElementById('main-content');
      const isAdmin = currentUser.role === 'admin';
      let menuButtons = '';
      if (isAdmin) {
        menuButtons = `
          <button id="archive-btn">▸ АРХИВ ДОКУМЕНТОВ</button>
          <button id="account-btn">▸ АККАУНТ</button>
          <button id="chat-btn">▸ СВЯЗЬ</button>
          <button id="admin-btn">▸ АДМИН-ПАНЕЛЬ</button>
          <button id="easter-btn">▸ ПАСХАЛКИ</button>
        `;
      } else {
        menuButtons = `
          <button id="archive-btn">▸ АРХИВ ДОКУМЕНТОВ</button>
          <button id="account-btn">▸ АККАУНТ</button>
          <button id="chat-btn">▸ СВЯЗЬ</button>
          <button id="record-btn">▸ ЗАПИСЬ</button>
          <button id="map-btn">▸ КАРТА</button>
          <button id="contacts-btn">▸ КОНТАКТЫ</button>

    async function openChat(contact, isFirstLoad = false) {
      currentChatContact = contact;
      const adminDiv = document.getElementById('contact-admin');
      const siDiv = document.getElementById('contact-si');
      if (adminDiv && siDiv) {
        if (contact === 'ADMIN') { adminDiv.classList.add('active-contact'); siDiv.classList.remove('active-contact'); }
        else { siDiv.classList.add('active-contact'); adminDiv.classList.remove('active-contact'); }
      }
      const loadingDiv = document.getElementById('chat-loading');
      const messagesDiv = document.getElementById('messages');
      if (loadingDiv && messagesDiv) { loadingDiv.style.display = 'block'; messagesDiv.style.display = 'none'; }
      let html = '';
      if (currentUser.role === 'viewer') {
        const staticMsgs = getViewerChatMessages(contact);
        staticMsgs.forEach(msg => { html += `<div class="message ${msg.class}"><strong>${escapeHtml(msg.from_sender)}:</strong> ${escapeHtml(msg.text)}</div>`; });
      } else {
        const msgs = await fetchMessagesForAdminPlayer(contact);
        msgs.forEach(msg => {
          const cls = msg.from_sender === "ADMIN" ? "admin" : msg.from_sender === "SI4015" ? "si" : "player";
          const delBtn = currentUser.role === 'admin' ? `<button class="delete-msg-btn" data-id="${msg.id}">✕</button>` : '';
          html += `<div class="message ${cls}"><strong>${escapeHtml(msg.from_sender)}:</strong> ${escapeHtml(msg.text)} ${delBtn}</div>`;
        });
      }
      if (messagesDiv) messagesDiv.innerHTML = html;
      if (loadingDiv && messagesDiv) { loadingDiv.style.display = 'none'; messagesDiv.style.display = 'block'; }
      if (currentUser.role === 'admin' && messagesDiv) {
        document.querySelectorAll('.delete-msg-btn').forEach(btn => {
          btn.onclick = async (e) => {
            e.stopPropagation();
            if (confirm("Удалить сообщение?")) { await deleteMessageFromDB(parseInt(btn.getAttribute('data-id'))); await openChat(currentChatContact); }
          };
        });
      }
      if (messagesDiv) messagesDiv.scrollTop = messagesDiv.scrollHeight;
      if (isFirstLoad && currentUser.role === 'admin') {
        const sendBtn = document.getElementById('send-msg-btn');
        const chatInput = document.getElementById('chat-input');
        if (sendBtn && chatInput) { sendBtn.onclick = () => sendMessage(); chatInput.addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); }); }
      }
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      const senderSelect = document.getElementById('sender-select');
      const sender = senderSelect ? senderSelect.value : 'ADMIN';
      await sendMessageToDB(currentChatContact, sender, text);
      await openChat(currentChatContact);
      input.value = '';
    }

        <h2>Редактирование пасхалки</h2>
        <label>Тип триггера:</label>
        <select id="easter-trigger-type">
          <option value="idle_timeout" ${egg.trigger_type === 'idle_timeout' ? 'selected' : ''}>Бездействие (по таймеру)</option>
          <option value="key_combination" ${egg.trigger_type === 'key_combination' ? 'selected' : ''}>Комбинация клавиш</option>
        </select><br>
        <label>Значение триггера:</label>
        <input id="easter-trigger-value" value="${escapeHtml(egg.trigger_value)}"><br>
        <label><input type="checkbox" id="easter-show-article" ${egg.show_article ? 'checked' : ''}> Показать статью</label><br>
        <textarea id="easter-article-text" rows="4">${escapeHtml(egg.article_text || '')}</textarea><br>
        <label><input type="checkbox" id="easter-show-image" ${egg.show_image ? 'checked' : ''}> Показать изображение</label><br>
        <input id="easter-image-url" value="${escapeHtml(egg.image_url || '')}" placeholder="URL изображения"><br>
        <label><input type="checkbox" id="easter-download-file" ${egg.download_file ? 'checked' : ''}> Скачать файл</label><br>
        <input id="easter-file-url" value="${escapeHtml(egg.file_url || '')}" placeholder="URL файла"><br>
        <input id="easter-file-name" value="${escapeHtml(egg.file_name || '')}" placeholder="Имя файла"><br>
        <label><input type="checkbox" id="easter-is-active" ${egg.is_active ? 'checked' : ''}> Активна</label><br>
        <button id="save-edit-easter-btn">Сохранить</button>
      `, async () => {
        const saveBtn = document.getElementById('save-edit-easter-btn');
        if (saveBtn) {
          saveBtn.onclick = async () => {
            const triggerType = document.getElementById('easter-trigger-type').value;
            const triggerValue = document.getElementById('easter-trigger-value').value.trim();
            if (!triggerValue) { alert("Заполните значение триггера"); return; }
            const showArticle = document.getElementById('easter-show-article').checked;
            const articleText = document.getElementById('easter-article-text').value.trim();
            const showImage = document.getElementById('easter-show-image').checked;
            const imageUrl = document.getElementById('easter-image-url').value.trim();
            const downloadFile = document.getElementById('easter-download-file').checked;
            const fileUrl = document.getElementById('easter-file-url').value.trim();
            const fileName = document.getElementById('easter-file-name').value.trim() || 'аномалия.txt';
            const isActive = document.getElementById('easter-is-active').checked;
            await updateEasterEgg(id, {
              trigger_type: triggerType,
              trigger_value: triggerValue,
              show_article: showArticle,
              article_text: showArticle ? articleText : null,
              show_image: showImage,
              image_url: showImage ? imageUrl : null,
              download_file: downloadFile,
              file_url: downloadFile ? fileUrl : null,
              file_name: downloadFile ? fileName : null,
              is_active: isActive
            });
            closeModal(); showEasterAdmin();
          };
        }
      });
    }

    // ========== ВХОД ==========
    document.getElementById('login-btn').onclick = async () => {
      const login = document.getElementById('login-input').value.trim();
      const password = document.getElementById('pass-input').value;
      const user = users[login];
      if (user) {
        const enteredHash = CryptoJS.SHA256(password).toString();
        if (enteredHash === user.hash) {
          currentUser = { login, role: user.role, name: user.name };
          let loadingOverlay = null;
          if (currentUser.role !== 'admin') loadingOverlay = showLoading(null, true);
          if (currentUser.role === 'player' || currentUser.role === 'viewer') {
            setTimeout(() => { if (loadingOverlay) hideLoading(loadingOverlay); document.getElementById('login-section').classList.add('hidden'); document.getElementById('main-section').classList.remove('hidden'); showHome(); }, 1000);
          } else { if (loadingOverlay) hideLoading(loadingOverlay); document.getElementById('login-section').classList.add('hidden'); document.getElementById('main-section').classList.remove('hidden'); showHome(); }
          return;
        } else {
          alert(`Неверный пароль.\nВведено: "${password}"\nПопробуйте пароль: AAF2615w (все заглавные, без пробелов)`);
        }
      } else {
        alert("Неверный код агента.");
      }
    };

    setInterval(() => { const el = document.getElementById('current-time'); if (el) el.textContent = new Date().toLocaleString('ru-RU'); }, 1000);
    const tickerMessages = ["СЕТЬ ШИФРУЕТСЯ • AES-256", "ВНЕШНИЕ КАНАЛЫ ЗАБЛОКИРОВАНЫ", "КЛЮЧИ ОБНОВЛЕНЫ • ПРОТОКОЛ M-5", "ПОПЫТКА НЕСАНКЦИОНИРОВАННОГО ДОСТУПА", "СИСТЕМА АНТИ-ФИШИНГ АКТИВНА"];
    let idx = 0;
    setInterval(() => { const footer = document.getElementById('security-footer'); if (footer) footer.textContent = tickerMessages[idx % tickerMessages.length] + " • " + new Date().toLocaleTimeString(); idx++; }, 10000);
  })();
</script>
</body>
</html>
