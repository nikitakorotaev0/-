      background: transparent;

      border: 1px solid var(--accent);
      padding: 10px 16px;

      justify-content: center;

      padding: 10px;

      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      max-width: 700px;
      margin: 40px auto;
    }
    .back-btn { margin-bottom: 15px; }
    .chat-container {
      display: flex;
      height: 65vh;
      border: 1px solid var(--accent);
    }
    .contacts {
      width: 240px;
      border-right: 1px solid #333;
      padding: 10px;
      background: #111;
    }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #0a0a0a;
    }
    .message {
      margin: 10px 0;
      padding: 8px 12px;
      border-radius: 4px;

    }

    .message.si { background: #001122; color: #88ccff; border-left: 3px solid #88ccff; }
    .message.player { background: #221100; color: #ffcc88; margin-left: auto; text-align: right; border-right: 3px solid #ffcc88; }
    .input-area {
      padding: 12px;
      border-top: 1px solid #333;
      background: #111;
    }
    .status-bar {
      text-align: center;
      padding: 6px;
      background: #0a0a0a;
      font-size: 11px;
      color: var(--accent);
      border-top: 1px solid var(--accent);
    }

      background: none;
      border: none;
      color: #ff5555;
      font-size: 12px;
      margin-left: 10px;
      cursor: pointer;

      background: #000000cc;

      padding: 4px;
      text-align: center;

      border-top: 1px solid var(--accent);

    @media (max-width: 600px) {
      .menu-grid { grid-template-columns: 1fr; }
      .chat-container { flex-direction: column; }
      .contacts { width: 100%; border-right: none; border-bottom: 1px solid #333; }

</head>

// ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function showModal(content, onClose) {
  const modal = document.getElementById('modal');
  const modalContent = document.getElementById('modal-content');
  modalContent.innerHTML = content + `<br><br><button id="modal-close-btn">ЗАКРЫТЬ</button>`;
  modal.style.display = 'flex';
  document.getElementById('modal-close-btn').onclick = () => {
    modal.style.display = 'none';
    if (onClose) onClose();
  };
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function showFullImage(src) {
  showModal(`<div style="text-align:center;"><img src="${escapeHtml(src)}" style="max-width:100%; max-height:80vh; border:1px solid var(--accent);"></div>`);
}

function showLoading(callback) {
  const overlay = document.createElement('div');
  overlay.className = 'loading-overlay';
  overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; color:#0f0; flex-direction:column;';
  overlay.innerHTML = `
    <div>ЗАПУСК ПРОТОКОЛА ДОСТУПА...</div>
    <div style="width:300px; height:20px; border:1px solid #0f0; margin-top:20px;"><div style="width:0%; height:100%; background:#0f0; animation: fillAnim 0.8s ease-out forwards;"></div></div>
    <div style="margin-top:15px; font-size:10px;">ДЕШИФРОВАНИЕ КЛЮЧЕЙ...</div>
    <style> @keyframes fillAnim { 0% { width:0%; } 100% { width:100%; } } </style>
  `;
  document.body.appendChild(overlay);
  setTimeout(() => { overlay.remove(); if (callback) callback(); }, 1000);
}

// ========== РАБОТА С БАЗОЙ ДАННЫХ ==========
async function fetchArticles() {
  const { data, error } = await supabase.from('articles').select('*').order('id', { ascending: false });
  if (error) { console.error(error); return []; }
  return data;
}
async function addArticle(article) {
  const { error } = await supabase.from('articles').insert(article);
  if (error) console.error(error);
}
async function updateArticle(id, updates) {
  const { error } = await supabase.from('articles').update(updates).eq('id', id);
  if (error) console.error(error);
}
async function deleteArticle(id) {
  const { error } = await supabase.from('articles').delete().eq('id', id);
  if (error) console.error(error);
}
async function fetchMessages(contact) {
  const { data, error } = await supabase.from('messages').select('*').eq('contact', contact).order('id', { ascending: true });
  if (error) return [];
  return data;
}
async function sendMessageToDB(contact, from, text) {
  const newMsg = {
    id: Date.now(),
    contact: contact,
    from_sender: from,
    text: text,
    time: new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})
  };
  const { error } = await supabase.from('messages').insert(newMsg);
  if (error) console.error(error);
}
async function deleteMessageFromDB(id) {
  const { error } = await supabase.from('messages').delete().eq('id', id);
  if (error) console.error(error);
}

// АРХИВ
async function showArchive() {
  const app = document.getElementById('app');

    <button id="search-btn">НАЧАТЬ ПОИСК</button>
    ${currentUser.role === 'admin' ? `<br><br><h3>Всего статей: ${articles.length}</h3>` : ''}
    <div class="status-bar" style="margin-top:20px;">🔒 ДОКУМЕНТЫ ЗАШИФРОВАНЫ • ДОСТУП ПО КОДУ</div>
  `;
  document.getElementById('back-home').onclick = () => showHome();
  document.getElementById('search-btn').onclick = async () => {
    const code = document.getElementById('search-code').value.trim().toUpperCase();
    const article = articles.find(a => a.code.toUpperCase() === code);
    if (article) {
      let imgHtml = (article.images || []).map(src => `<img src="${escapeHtml(src)}" style="max-width:100%; margin:10px 0; border:1px solid #444; cursor:pointer;" class="article-img" data-src="${escapeHtml(src)}">`).join('');
      let adminBtns = '';
      if (currentUser.role === 'admin') {
        adminBtns = `<button id="delete-article-btn">Удалить статью</button>`;
      }
      showModal(`
        <div>
          <h2>${escapeHtml(article.title)}</h2>
          <p><strong>Код:</strong> ${escapeHtml(article.code)} | <strong>Дата:</strong> ${escapeHtml(article.date)}</p>
          <p>${escapeHtml(article.text).replace(/\n/g, '<br>')}</p>
          ${imgHtml}
        </div>
        ${adminBtns}
      `, () => {
        if (currentUser.role === 'admin') {
          const delBtn = document.getElementById('delete-article-btn');
          if (delBtn) delBtn.onclick = async () => { await deleteArticle(article.id); closeModal(); showArchive(); };
        }
        document.querySelectorAll('.article-img').forEach(img => {
          img.onclick = (e) => showFullImage(e.target.getAttribute('data-src'));
        });
      });
    } else {
      showModal("КОД НЕ НАЙДЕН В АРХИВЕ");
    }
  };
}

// ЧАТ (без времени)
let currentChatContact = "ADMIN";
async function showChat() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <button id="back-home-chat" class="back-btn">← НАЗАД НА ГЛАВНУЮ</button>
    <h2>ЗАЩИЩЁННЫЙ КАНАЛ СВЯЗИ</h2>

        <div id="contact-admin" style="padding:14px; cursor:pointer; border-bottom:1px solid #333;">ADMIN</div>
        <div id="contact-si" style="padding:14px; cursor:pointer;">SI4015</div>
      </div>
      <div class="chat-area">
        <div class="messages" id="messages"></div>
        <div class="input-area" id="input-area" style="${currentUser.role === 'player' ? 'display:none;' : ''}">
          <select id="sender-select" style="width:30%; display:${currentUser.role==='admin'?'inline-block':'none'}">
            <option value="ADMIN">От ADMIN</option>
            <option value="SI4015">От SI4015</option>
            <option value="ANDREY TOCHILIN">От ANDREY TOCHILIN</option>
          </select>
          <input type="text" id="chat-input" placeholder="Сообщение..." style="width:50%;">
          <button id="send-msg-btn">ОТПРАВИТЬ</button>
        </div>
        <div class="status-bar">🔒 Сеть защищённой связи • Уровень шифрования: A-7</div>
      </div>
    </div>
  `;
  document.getElementById('back-home-chat').onclick = () => showHome();
  document.getElementById('contact-admin').onclick = () => openChat('ADMIN');
  document.getElementById('contact-si').onclick = () => openChat('SI4015');
  if (currentUser.role !== 'player') {
    document.getElementById('send-msg-btn').onclick = () => sendMessage();
    document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
  }
  await openChat('ADMIN');
}

async function openChat(contact) {
  currentChatContact = contact;
  const messagesDiv = document.getElementById('messages');
  if (!messagesDiv) return;
  const msgs = await fetchMessages(contact);
  let html = '';
  msgs.forEach(msg => {
    const cls = msg.from_sender === "ADMIN" ? "admin" : msg.from_sender === "SI4015" ? "si" : "player";
    const deleteBtn = (currentUser.role === 'admin') ? `<button class="delete-msg-btn" data-id="${msg.id}">✕</button>` : '';
    html += `
      <div class="message ${cls}">
        <strong>${escapeHtml(msg.from_sender)}:</strong> ${escapeHtml(msg.text)}
        ${deleteBtn}
      </div>`;
  });
  messagesDiv.innerHTML = html;
  if (currentUser.role === 'admin') {
    document.querySelectorAll('.delete-msg-btn').forEach(btn => {
      btn.onclick = async (e) => {
        e.stopPropagation();
        const msgId = parseInt(btn.getAttribute('data-id'));
        if (confirm("Удалить сообщение?")) {
          await deleteMessageFromDB(msgId);
          await openChat(currentChatContact);
        }
      };
    });
  }
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  const senderSelect = document.getElementById('sender-select');
  const sender = senderSelect ? senderSelect.value : (currentUser.role === 'admin' ? 'ADMIN' : currentUser.name);
  await sendMessageToDB(currentChatContact, sender, text);
  await openChat(currentChatContact);
  input.value = '';
}

// АДМИН-ПАНЕЛЬ
async function showAdmin() {
  const app = document.getElementById('app');
  const articles = await fetchArticles();
  let html = `
    <button id="back-home-admin" class="back-btn">← НАЗАД НА ГЛАВНУЮ</button>
    <h2>АДМИН-ПАНЕЛЬ</h2>
    <button id="create-article-btn">+ Создать новую статью</button><br><br>
  `;
  articles.forEach(a => {
    html += `<div style="border:1px solid #444; padding:15px; margin:10px 0;">
      <strong>${escapeHtml(a.code)}</strong> — ${escapeHtml(a.title)}
      <button class="edit-article-btn" data-id="${a.id}" style="float:right; margin-left:8px;">Редактировать</button>
      <button class="del-article-btn" data-id="${a.id}" style="float:right;">Удалить</button>
    </div>`;
  });
  app.innerHTML = html;
  document.getElementById('back-home-admin').onclick = () => showHome();
  document.getElementById('create-article-btn').onclick = () => createArticleForm();
  document.querySelectorAll('.edit-article-btn').forEach(btn => {
    btn.onclick = () => editArticle(parseInt(btn.getAttribute('data-id')));
  });
  document.querySelectorAll('.del-article-btn').forEach(btn => {
    btn.onclick = async () => { if(confirm("Удалить статью?")) { await deleteArticle(parseInt(btn.getAttribute('data-id'))); showAdmin(); } };
  });
}

function createArticleForm() {
  showModal(`
    <h2>Создание статьи</h2>
    <input id="new-code" placeholder="Код (например, X-1234)"><br>
    <input id="new-title" placeholder="Заголовок"><br>
    <textarea id="new-text" rows="7" placeholder="Текст..."></textarea><br>
    <input id="new-image1" placeholder="Ссылка на фото 1"><br>
    <input id="new-image2" placeholder="Ссылка на фото 2"><br>
    <button id="save-new-btn">Сохранить статью</button>
  `, async () => {
    document.getElementById('save-new-btn').onclick = async () => {
      const code = document.getElementById('new-code').value.trim();
      const title = document.getElementById('new-title').value.trim();
      const text = document.getElementById('new-text').value.trim();
      if (!code || !title || !text) { alert("Заполните обязательные поля"); return; }
      const newArticle = {
        id: Date.now(),
        code: code,
        title: title,
        text: text,
        images: [document.getElementById('new-image1').value.trim(), document.getElementById('new-image2').value.trim()].filter(Boolean),
        date: new Date().toISOString().split('T')[0]
      };
      await addArticle(newArticle);
      closeModal();
      showAdmin();
    };
  });
}

async function editArticle(id) {
  const articles = await fetchArticles();
  const a = articles.find(x => x.id === id);
  if (!a) return;
  showModal(`
    <h2>Редактирование</h2>
    <input id="edit-code" value="${escapeHtml(a.code)}"><br>
    <input id="edit-title" value="${escapeHtml(a.title)}"><br>
    <textarea id="edit-text" rows="8">${escapeHtml(a.text)}</textarea><br>
    <input id="edit-image1" value="${escapeHtml(a.images?.[0]||'')}"><br>
    <input id="edit-image2" value="${escapeHtml(a.images?.[1]||'')}"><br>
    <button id="save-edit-btn">Сохранить изменения</button>
  `, async () => {
    document.getElementById('save-edit-btn').onclick = async () => {
      const updates = {
        code: document.getElementById('edit-code').value.trim(),
        title: document.getElementById('edit-title').value.trim(),
        text: document.getElementById('edit-text').value.trim(),
        images: [document.getElementById('edit-image1').value.trim(), document.getElementById('edit-image2').value.trim()].filter(Boolean)
      };
      await updateArticle(id, updates);
      closeModal();
      showAdmin();
    };
  });
}

  "КЛЮЧИ ДОСТУПА ОБНОВЛЕНЫ • ВХОД ТОЛЬКО ПО ПРОТОКОЛУ M-5",
  "ТРАФИК ПРОХОДИТ ЧЕРЕЗ VPN БЮРО • IP НЕ ОПРЕДЕЛЯЕТСЯ",
