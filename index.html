<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>BIAR</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    :root { --bg: #0a0a0a; --accent: #00cc55; --gray: #bbbbbb; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--gray); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
    .header { background: #0a0a0a; padding: 8px 15px; border-bottom: 1px solid var(--accent); display: flex; justify-content: space-between; flex-wrap: wrap; font-size: 0.9rem; }
    .accent { color: var(--accent); text-shadow: 0 0 5px var(--accent); }
    .container { padding: 20px; height: calc(100vh - 52px); overflow-y: auto; }
    button { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 10px 16px; cursor: pointer; font-family: inherit; margin: 5px; transition: 0.2s; font-size: 0.9rem; }
    button:hover { background: var(--accent); color: #000; transform: scale(1.02); }
    input, textarea, select { background: #111; border: 1px solid #444; color: var(--gray); padding: 10px; width: 100%; font-family: inherit; margin: 8px 0; font-size: 1rem; }
    .modal { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.97); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 10px; }
    .modal-content { background: #111; border: 1px solid var(--accent); padding: 25px; max-width: 720px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; max-width: 700px; margin: 40px auto 20px auto; }
    .logout-container { display: flex; justify-content: center; margin-top: 30px; }
    .back-btn { margin-bottom: 15px; }
    .chat-container { display: flex; height: 65vh; border: 1px solid var(--accent); }
    .contacts { width: 240px; border-right: 1px solid #333; padding: 10px; background: #111; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .messages { flex: 1; padding: 15px; overflow-y: auto; background: #0a0a0a; }
    .message { margin: 10px 0; padding: 8px 12px; border-radius: 4px; max-width: 75%; word-wrap: break-word; }
    .message.admin { background: #002200; color: #00ff88; border-left: 3px solid #00ff88; }
    .message.si { background: #001122; color: #88ccff; border-left: 3px solid #88ccff; }
    .message.player, .message.viewer { background: #221100; color: #ffcc88; margin-left: auto; text-align: right; border-right: 3px solid #ffcc88; }
    .input-area { padding: 12px; border-top: 1px solid #333; background: #111; }
    .status-bar { text-align: center; padding: 6px; background: #0a0a0a; font-size: 11px; color: var(--accent); border-top: 1px solid var(--accent); }
    .delete-msg-btn { background: none; border: none; color: #ff5555; font-size: 12px; margin-left: 10px; cursor: pointer; }
    .profile-photo { width: 180px; height: 180px; border: 2px solid var(--accent); background: #1a1a1a; margin: 15px auto; display: flex; align-items: center; justify-content: center; flex-direction: column; font-size: 12px; }
    .security-ticker { position: fixed; bottom: 0; left: 0; width: 100%; background: #000000cc; backdrop-filter: blur(4px); color: #0f0; font-size: 10px; padding: 4px; text-align: center; z-index: 99; border-top: 1px solid var(--accent); white-space: nowrap; overflow-x: auto; }
    .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #0f0; }
    .hidden { display: none; }
    .ascii-logo { text-align: center; margin-bottom: 20px; font-family: monospace; font-size: 12px; line-height: 1.2; color: var(--accent); white-space: pre; }
    .img-placeholder { background: #111; border: 1px dashed var(--accent); padding: 20px; text-align: center; color: var(--accent); font-size: 12px; margin: 10px 0; }
    .loading-bar { width: 100%; height: 4px; background: #333; margin-top: 8px; overflow: hidden; }
    .loading-bar-fill { width: 30%; height: 100%; background: var(--accent); animation: loadingLoop 1s infinite linear; }
    @keyframes loadingLoop { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
    .active-contact { background: var(--accent); color: #000; font-weight: bold; text-shadow: none; }
    .full-image-modal { text-align: center; }
    .full-image-modal img { max-width: 100%; max-height: 80vh; border: 2px solid var(--accent); background: #000; }
    .readonly-field { background: #0a0a0a; color: #777; cursor: not-allowed; resize: none; }
    .file-input { border: 1px solid var(--accent); padding: 8px; background: #111; cursor: pointer; }
    .image-preview { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
    .image-preview-item { position: relative; display: inline-block; }
    .image-preview-item img { max-width: 100px; max-height: 100px; border: 1px solid var(--accent); }
    .remove-image, .remove-existing { position: absolute; top: -8px; right: -8px; background: #f00; color: #fff; border-radius: 50%; width: 20px; height: 20px; text-align: center; cursor: pointer; font-size: 12px; line-height: 18px; }
    @media (max-width: 600px) { .container { padding: 12px; } .menu-grid { grid-template-columns: 1fr; gap: 10px; margin: 20px auto; } button { padding: 12px; font-size: 1rem; width: 100%; margin: 4px 0; } .logout-container button { width: auto; min-width: 200px; } .chat-container { flex-direction: column; } .contacts { width: 100%; border-right: none; border-bottom: 1px solid #333; display: flex; justify-content: space-around; } .contacts div { text-align: center; flex: 1; } .message { max-width: 90%; font-size: 0.9rem; } .input-area select, .input-area input, .input-area button { width: 100%; margin: 5px 0; } .input-area { display: flex; flex-direction: column; } .ascii-logo { font-size: 8px; } }
    .delay-banner { background: #1a1a1a; border: 1px solid var(--accent); color: var(--accent); padding: 10px 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .delay-banner button { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 4px 12px; cursor: pointer; font-size: 12px; }
    .delay-banner button:hover { background: var(--accent); color: #000; }
    #kegf-container { position: fixed; bottom: 25px; right: 25px; z-index: 999; display: none; flex-direction: column; align-items: flex-end; pointer-events: auto; }
    #kegf-bubbles-wrapper { position: relative; width: 0; height: 0; pointer-events: none; }
    #kegf-bubbles-wrapper > .kegf-bubble { pointer-events: auto; }
    @keyframes kegfFloat { 0% { transform: translateY(0px); } 50% { transform: translateY(-6px); } 100% { transform: translateY(0px); } }
    #kegf-image { width: 80px; height: auto; transition: transform 0.2s; filter: drop-shadow(0 0 10px rgba(0,200,80,0.4)); animation: kegfFloat 3s ease-in-out infinite; margin-top: 10px; z-index: 10000; position: relative; pointer-events: auto; cursor: pointer; }
    #kegf-image:hover { animation-play-state: paused; transform: scale(1.08); }
    .kegf-bubble { background: #1a1a1a; border: 1px solid var(--accent); color: var(--gray); padding: 14px 18px; max-width: 300px; border-radius: 4px; font-size: 13px; position: absolute; right: 0; bottom: 0; box-shadow: 0 0 20px rgba(0,200,80,0.3); font-family: 'Courier New', monospace; line-height: 1.5; opacity: 0; transform: translateY(20px) scale(0.95); animation: bubbleAppear 0.3s ease forwards; pointer-events: auto; will-change: transform, opacity; margin: 0; transition: transform 0.2s; }
    @keyframes bubbleAppear { 0% { opacity: 0; transform: translateY(30px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    .kegf-bubble-ascii { max-width: 400px; padding: 20px; font-size: 11px; line-height: 1.2; background: #000; border-color: var(--accent); }
    .kegf-bubble-ascii pre { margin: 0; white-space: pre; font-family: 'Courier New', monospace; color: var(--accent); }
    .kegf-bubble-close { background: none; border: none; color: var(--accent); position: absolute; top: 4px; right: 8px; font-size: 16px; cursor: pointer; }
    .kegf-bubble-close:hover { color: #fff; }
    @media (max-width: 600px) { #kegf-image { width: 60px; } .kegf-bubble { max-width: 200px; font-size: 11px; padding: 10px 12px; } .kegf-bubble-ascii { max-width: 280px; font-size: 8px; padding: 12px; } }
    .error-modal h2 { color: #ff4444; }
    .error-modal .contact { color: var(--accent); text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>

<div class="header">
  <div><span class="accent">[BIAR]</span> БЮРО ИССЛЕДОВАНИЙ АНОМАЛИЙ РОССИИ — v9.1</div>
  <div><span id="current-time"></span></div>
</div>

<div class="container">
  <div id="login-section">
    <div style="text-align:center; margin-top:80px;">
      <h1 class="accent" style="font-size:28px;">БЮРО ИССЛЕДОВАНИЙ АНОМАЛИЙ РОССИИ</h1>
      <p style="margin:20px 0;">ДОСТУП К АРХИВУ РАЗРЕШЁН ТОЛЬКО АВТОРИЗОВАННЫМ АГЕНТАМ</p>
      <div style="max-width:420px; margin:40px auto;">
        <input type="text" id="login-input" placeholder="Код агента" autocomplete="off"><br>
        <input type="password" id="pass-input" placeholder="Пароль" autocomplete="off"><br>
        <button id="login-btn">ВХОД В СИСТЕМУ</button>
      </div>
      <div style="font-size:11px; color:#444;">ЗАЩИЩЁННЫЙ ВХОД • ТОЛЬКО ДЛЯ СОТРУДНИКОВ</div>
    </div>
  </div>
  <div id="main-section" class="hidden">
    <div id="main-content"></div>
  </div>
</div>

<div id="modal" class="modal"><div class="modal-content" id="modal-content"></div></div>
<div id="security-footer" class="security-ticker">СЕТЬ ШИФРУЕТСЯ • AES-256 • ЗАЩИЩЁННЫЙ СЕРВЕР</div>

<div id="kegf-container">
  <div id="kegf-bubbles-wrapper"></div>
  <img id="kegf-image" src="https://xfyppmvvobskdmksqnir.supabase.co/storage/v1/object/public/article-images/KEGF.png" alt="Kegf">
</div>

<script>
  (function() {
    // ========== ОБФУСЦИРОВАННЫЕ ДАННЫЕ ПОЛЬЗОВАТЕЛЕЙ ==========
    const _b = ["AT2","167","Adm","in","W"];
    const _c = [
      "be1f4506b29b2465352f725c9302b029ff9b76e95f555c8ff3c6c3b69ea78355",
      "e697c5113ce58b708b7c1f31f0423cc021d0bf3aacd3d63865c53a5f817ce278",
      "7c8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8"
    ];
    const _d = ["player", "admin", "viewer"];
    const _e = ["ANDREY TOCHILIN", "ADMINISTRATOR", "SEMEN LOBANOV"];

    function _buildLogin(index) {
      if (index === 0) return _b[0] + _b[1];
      if (index === 1) return _b[2] + _b[3];
      return _b[4];
    }
    function _getHash(index) { return _c[index]; }
    function _getRole(index) { return _d[index]; }
    function _getName(index) { return _e[index]; }

    const users = {};
    const uniqueIndices = [0, 1, 2];
    for (let idx of uniqueIndices) {
      const login = _buildLogin(idx);
      const hash = _getHash(idx);
      const role = _getRole(idx);
      const name = _getName(idx);
      users[login] = { hash, role, name };
    }
    console.log("Users loaded (обфусцированы)");

    const SUPABASE_URL = "https://xfyppmvvobskdmksqnir.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_MoW2nFpIaGZIQwEsKjQubw_T0ko9O7q";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let isSupabaseDown = false;

    // ========== КЕШ ДАННЫХ ==========
    let cachedArticles = null; // { role: [articles], adminAll: [articles] }
    let cachedEasterEggs = null;

    function invalidateCache() {
      cachedArticles = null;
      cachedEasterEggs = null;
    }

    function handleSupabaseError(error) {
      if (!error) return false;
      const msg = error.message || String(error);
      if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('ERR_NAME_NOT_RESOLVED') || msg.includes('net::ERR')) {
        if (!isSupabaseDown) {
          isSupabaseDown = true;
          showSupabaseDownModal();
        }
        return true;
      }
      return false;
    }

    function showSupabaseDownModal() {
      const modal = document.getElementById('modal');
      const modalContent = document.getElementById('modal-content');
      modalContent.innerHTML = `
        <div class="error-modal">
          <h2 style="color:#ff4444;">⚠️ КРИТИЧЕСКАЯ ОШИБКА</h2>
          <p style="font-size:18px; margin:20px 0;">Возникла ошибка неигрового характера.</p>
          <p style="font-size:16px; margin:10px 0;">Прохождение ARG дальше невозможно.</p>
          <p style="font-size:16px; margin:10px 0;">Обратитесь в Telegram: <span class="contact">@last_in_russia</span> как можно скорей.</p>
          <p style="font-size:12px; margin-top:30px; color:#777;">Связь с сервером потеряна. Пожалуйста, попробуйте позже.</p>
        </div>
        <br>
        <button id="supabase-error-close-btn" style="background:transparent; border:1px solid #ff4444; color:#ff4444; padding:8px 20px; cursor:pointer;">ПОНЯТНО</button>
      `;
      modal.style.display = 'flex';
      document.getElementById('supabase-error-close-btn').onclick = function() {
        modal.style.display = 'none';
      };
    }

    async function checkSupabaseConnection() {
      try {
        const { data, error } = await supabase.from('articles').select('count').limit(1);
        if (error) {
          handleSupabaseError(error);
          return false;
        }
        return true;
      } catch (e) {
        handleSupabaseError(e);
        return false;
      }
    }

    const STORAGE_BUCKET = "article-images";
    async function uploadFile(file) {
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
      const filePath = `${fileName}`;
      const { data, error } = await supabase.storage.from(STORAGE_BUCKET).upload(filePath, file, { cacheControl: '3600', upsert: false });
      if (error) {
        console.error(error);
        alert(`Ошибка загрузки файла ${file.name}: ${error.message}`);
        return null;
      }
      const { data: publicUrlData } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(filePath);
      return publicUrlData.publicUrl;
    }

    async function uploadImages(files) {
      const uploadedUrls = [];
      for (const file of files) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
        const filePath = `${fileName}`;
        const { error } = await supabase.storage.from(STORAGE_BUCKET).upload(filePath, file, { cacheControl: '3600', upsert: false });
        if (error) { console.error(error); alert(`Ошибка загрузки ${file.name}: ${error.message}`); return null; }
        const { data: publicUrlData } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(filePath);
        uploadedUrls.push(publicUrlData.publicUrl);
      }
      return uploadedUrls;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    function showModal(content, onOpen, onClose) {
      const modal = document.getElementById('modal');
      const modalContent = document.getElementById('modal-content');
      modalContent.innerHTML = content + `<br><br><button id="modal-close-btn">ЗАКРЫТЬ</button>`;
      modal.style.display = 'flex';
      if (onOpen) onOpen();
      document.getElementById('modal-close-btn').onclick = () => {
        modal.style.display = 'none';
        if (onClose) onClose();
      };
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function showFullImage(src, onCloseCallback) {
      showModal(`<div class="full-image-modal"><img src="${escapeHtml(src)}" style="max-width:100%; max-height:80vh; border:2px solid var(--accent); background:#000;" alt="Изображение"></div>`, null, () => { if (onCloseCallback) onCloseCallback(); });
    }
    function showLoading(callback, looped = false) {
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      const barHtml = `<div style="width:300px; height:20px; border:1px solid #0f0; margin-top:20px;"><div style="width:0%; height:100%; background:#0f0; ${looped ? 'animation: fillLoop 1.5s infinite linear;' : 'animation: fillAnim 0.8s ease-out forwards;'}" id="loading-fill"></div></div>`;
      overlay.innerHTML = `<div>ЗАПУСК ПРОТОКОЛА ДОСТУПА...</div>${barHtml}<div style="margin-top:15px;">ДЕШИФРОВАНИЕ КЛЮЧЕЙ...</div><style>@keyframes fillAnim { 0% { width:0%; } 100% { width:100%; } } @keyframes fillLoop { 0% { width:0%; } 50% { width:100%; } 100% { width:0%; } }</style>`;
      document.body.appendChild(overlay);
      if (!looped) { setTimeout(() => { overlay.remove(); if (callback) callback(); }, 1000); return null; }
      return overlay;
    }
    function hideLoading(overlay) { if (overlay && overlay.remove) overlay.remove(); }
    function deniedAccess() { showModal(`<h2>ДОСТУП ОТКЛОНЁН</h2><p>Недостаточный уровень доступа.</p>`); }

    // ========== РАБОТА СО СТАТЬЯМИ (с кешированием) ==========
    async function fetchArticlesForRole(force = false) {
      if (isSupabaseDown) { showSupabaseDownModal(); return []; }
      if (!force && cachedArticles && cachedArticles[currentUser.role]) {
        console.log("Используем кеш статей для роли:", currentUser.role);
        return cachedArticles[currentUser.role];
      }
      console.log("Загружаем статьи из Supabase для роли:", currentUser.role);
      let query = supabase.from('articles').select('*');
      if (currentUser.role === 'player') {
        query = query.or('visible_to_viewer.eq.false,visible_to_viewer.is.null');
      } else if (currentUser.role === 'viewer') {
        query = query.eq('visible_to_viewer', true);
      }
      const { data, error } = await query.order('id', { ascending: false });
      if (error) { handleSupabaseError(error); return []; }
      if (!cachedArticles) cachedArticles = {};
      cachedArticles[currentUser.role] = data;
      return data;
    }

    async function fetchAllArticlesForAdmin(force = false) {
      if (isSupabaseDown) { showSupabaseDownModal(); return []; }
      if (!force && cachedArticles && cachedArticles['adminAll']) {
        console.log("Используем кеш всех статей для админа");
        return cachedArticles['adminAll'];
      }
      console.log("Загружаем все статьи из Supabase (админ)");
      const { data, error } = await supabase.from('articles').select('*').order('id', { ascending: false });
      if (error) { handleSupabaseError(error); return []; }
      if (!cachedArticles) cachedArticles = {};
      cachedArticles['adminAll'] = data;
      return data;
    }

    async function addArticle(article) {
      if (isSupabaseDown) { showSupabaseDownModal(); return false; }
      const toInsert = { ...article, visible_to_viewer: !!article.visible_to_viewer };
      const { error } = await supabase.from('articles').insert(toInsert);
      if (error) { handleSupabaseError(error); showModal(`<h2>Ошибка сохранения</h2><p>${escapeHtml(error.message)}</p>`); return false; }
      invalidateCache();
      return true;
    }

    async function updateArticle(id, updates) {
      if (isSupabaseDown) { showSupabaseDownModal(); return; }
      const toUpdate = { ...updates, visible_to_viewer: !!updates.visible_to_viewer };
      const { error } = await supabase.from('articles').update(toUpdate).eq('id', id);
      if (error) handleSupabaseError(error);
      invalidateCache();
    }

    async function deleteArticle(id) {
      if (isSupabaseDown) { showSupabaseDownModal(); return; }
      const { error } = await supabase.from('articles').delete().eq('id', id);
      if (error) handleSupabaseError(error);
      invalidateCache();
    }

    // ========== РАБОТА С ПАСХАЛКАМИ (с кешированием) ==========
    async function fetchEasterEggs(force = false) {
      if (isSupabaseDown) { showSupabaseDownModal(); return []; }
      if (!force && cachedEasterEggs) {
        console.log("Используем кеш пасхалок");
        return cachedEasterEggs;
      }
      console.log("Загружаем пасхалки из Supabase");
      const { data, error } = await supabase.from('easter_eggs').select('*').order('id', { ascending: true });
      if (error) {
        console.error(error);
        if (error.code === '42P01') {
          showModal(`<h2>Таблица easter_eggs не найдена</h2><p>Выполните SQL в Supabase:</p><pre style="background:#000; color:#0f0; padding:10px;">CREATE TABLE easter_eggs (
  id BIGINT PRIMARY KEY,
  trigger_type TEXT NOT NULL,
  trigger_value TEXT NOT NULL,
  show_article BOOLEAN DEFAULT false,
  article_text TEXT,
  show_image BOOLEAN DEFAULT false,
  image_url TEXT,
  is_active BOOLEAN DEFAULT true,
  created_at TIMESTAMP DEFAULT NOW()
);
ALTER TABLE easter_eggs DISABLE ROW LEVEL SECURITY;</pre>`);
        }
        return [];
      }
      cachedEasterEggs = data;
      return data;
    }

    async function addEasterEgg(egg) {
      if (isSupabaseDown) { showSupabaseDownModal(); return false; }
      const { data, error } = await supabase.from('easter_eggs').insert(egg).select();
      if (error) {
        console.error(error);
        if (error.code === '42501' || error.message.includes('row-level security')) {
          showModal(`<h2>Ошибка прав доступа</h2><p>Нужно отключить RLS для таблицы easter_eggs.</p><p>Выполните в SQL Editor Supabase:</p><pre style="background:#000; color:#0f0; padding:10px;">ALTER TABLE easter_eggs DISABLE ROW LEVEL SECURITY;</pre><p>После этого повторите попытку.</p>`);
        } else {
          showModal(`<h2>Ошибка сохранения пасхалки</h2><p>${escapeHtml(error.message)}</p>`);
        }
        return false;
      }
      cachedEasterEggs = null;
      return true;

    let easterEggs = [];
    let idleTimer = null;
    let keyCombinationBuffer = '';

    function resetIdleTimer() {
      if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
      const idleEgg = easterEggs.find(e => e.trigger_type === 'idle_timeout' && e.is_active === true);
      if (idleEgg) {
        const timeoutSeconds = parseInt(idleEgg.trigger_value) || 30;
        idleTimer = setTimeout(() => {
          if (!isEasterTriggered) {
            triggerEasterEgg(idleEgg);
          }
        }, timeoutSeconds * 1000);
      }
    }

    function triggerEasterEgg(egg) {
      if (isEasterTriggered) return;
      isEasterTriggered = true;
      let content = '';
      if (egg.show_article && egg.article_text) {
        content += `<div style="background:#000; border:2px solid #ff0000; color:#ff4444; padding:20px; text-shadow:0 0 10px #ff0000;">`;
        content += `<h2 style="color:#ff0000;">⚠️ ОБНАРУЖЕНА АНОМАЛИЯ</h2>`;
        content += `<p>${escapeHtml(egg.article_text).replace(/\n/g, '<br>')}</p>`;
        content += `</div>`;
      }
      if (egg.show_image && egg.image_url) {
        content += `<div style="text-align:center; margin-top:15px;"><img src="${escapeHtml(egg.image_url)}" style="max-width:100%; max-height:60vh; border:2px solid var(--accent); background:#000;" alt="Изображение"></div>`;
      }
      if (!content) {
        console.warn("Пасхалка сработала, но нет контента для показа.");
        isEasterTriggered = false;
        return;
      }
      showModal(content);
      setTimeout(() => { isEasterTriggered = false; }, 5000);
    }

    function handleKeyDown(e) {
      const key = e.key;
      if (key.length === 1) {
        keyCombinationBuffer += key.toLowerCase();
        const comboEggs = easterEggs.filter(e => e.trigger_type === 'key_combination' && e.is_active === true);
        for (const egg of comboEggs) {
          const trigger = egg.trigger_value.toLowerCase();
          if (keyCombinationBuffer.endsWith(trigger)) {
            if (!isEasterTriggered) {
              triggerEasterEgg(egg);
            }
            keyCombinationBuffer = '';
            break;
          }
        }
        if (keyCombinationBuffer.length > 20) {
          keyCombinationBuffer = keyCombinationBuffer.slice(-20);
        }
      }
    }

    function enableEasterEggs() {
      document.removeEventListener('mousemove', resetIdleTimer);
      document.removeEventListener('click', resetIdleTimer);
      document.removeEventListener('keydown', handleKeyDown);
      document.addEventListener('mousemove', resetIdleTimer);
      document.addEventListener('click', resetIdleTimer);
      document.addEventListener('keydown', handleKeyDown);
      resetIdleTimer();
    }

    function disableEasterEggs() {
      document.removeEventListener('mousemove', resetIdleTimer);
      document.removeEventListener('click', resetIdleTimer);
      document.removeEventListener('keydown', handleKeyDown);
      if (idleTimer) {
        clearTimeout(idleTimer);
        idleTimer = null;
      }
      keyCombinationBuffer = '';
    }

    function getRandomTip() {

      for (let tip of KEGF_TIPS) totalWeight += tip.weight;
      let random = Math.random() * totalWeight;
      for (let tip of KEGF_TIPS) {

    function playSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.value = 880;
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.15);
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (e) { /* игнорируем */ }
    }

    function createKegfBubble(text, isAscii = false) {
      if (!kegfEnabled) return;
      const bubble = document.createElement('div');
      bubble.className = 'kegf-bubble';
      if (isAscii) {
        bubble.classList.add('kegf-bubble-ascii');
        const pre = document.createElement('pre');
        pre.textContent = text;
        bubble.appendChild(pre);
      } else {
        const span = document.createElement('span');
        span.textContent = text;
        bubble.appendChild(span);
      }
      const closeBtn = document.createElement('button');
      closeBtn.className = 'kegf-bubble-close';
      closeBtn.textContent = '✕';
      closeBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        bubble.remove();
      });
      bubble.appendChild(closeBtn);

      const rotation = (Math.random() * 6 - 3);
      bubble.style.setProperty('--rot', rotation + 'deg');
      bubble.style.transform = `rotate(${rotation}deg)`;

      const allBubbles = kegfWrapper.querySelectorAll('.kegf-bubble');
      allBubbles.forEach(b => {
        const x = parseFloat(b.dataset.x) || 0;
        const y = parseFloat(b.dataset.y) || 0;
        const newX = x + 2;
        const newY = y + 2;
        b.dataset.x = newX;
        b.dataset.y = newY;
        b.style.transform = `translate(${newX}px, ${newY}px) rotate(${b.dataset.rot || '0deg'})`;
      });

      bubble.dataset.x = 0;
      bubble.dataset.y = 0;
      bubble.dataset.rot = rotation + 'deg';
      bubble.style.zIndex = ++kegfBubbleCount;

      kegfWrapper.appendChild(bubble);
      playSound();
    }

    }

    function scheduleKegfMessage() {
      if (kegfMessageInterval) {
        clearTimeout(kegfMessageInterval);
        kegfMessageInterval = null;
      }
      const delay = Math.floor(Math.random() * (60000 - 10000 + 1)) + 10000;
      kegfMessageInterval = setTimeout(() => {
        if (kegfEnabled && currentUser && currentUser.role === 'player') {
          const tip = getRandomTip();
          if (tip === "ASCII_ART") {
            createKegfBubble(ASCII_ART, true);
          } else {
            createKegfBubble(tip);
          }
        }
        scheduleKegfMessage();
      }, delay);
    }

    function initKegf() {
      if (!currentUser || currentUser.role !== 'player') {
        document.getElementById('kegf-container').style.display = 'none';
        return;
      }
      document.getElementById('kegf-container').style.display = 'flex';
      kegfEnabled = true;
      scheduleKegfMessage();
    }

    window.initKegf = initKegf;
  })();
</script>
</body>
</html>
